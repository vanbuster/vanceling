<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>光之庭院 - 轻音乐版</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --glass: rgba(18, 24, 68, 0.48);
      --glass-border: rgba(226, 236, 255, 0.26);
      --text: rgba(245, 250, 255, 0.94);
      --muted: rgba(220, 232, 255, 0.68);
      --cyan: #bff7ff;
      --violet: #cbb8ff;
      --pink: #ffd6f6;
      --gold: #ffe6a9;
      --deep: #050818;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050818;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
    }

    #game {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: none;
      touch-action: none;
    }

    #camera {
      position: fixed;
      right: 18px;
      bottom: 18px;
      width: 168px;
      height: 126px;
      object-fit: cover;
      transform: scaleX(-1);
      border-radius: 22px;
      border: 1px solid rgba(226, 236, 255, 0.22);
      box-shadow: 0 18px 54px rgba(0,0,0,0.32), 0 0 34px rgba(155, 190, 255, 0.14);
      opacity: 0;
      pointer-events: none;
      z-index: 8;
      transition: opacity 260ms ease;
      background: rgba(5,8,24,0.7);
    }

    body.camera-ready #camera {
      opacity: 0.2;
    }

    .hud {
      position: fixed;
      top: 24px;
      left: 28px;
      right: 28px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 18px;
      pointer-events: none;
      z-index: 10;
    }

    .hud-block {
      width: fit-content;
      min-width: 150px;
      padding: 11px 18px;
      border: 1px solid var(--glass-border);
      border-radius: 999px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.13), rgba(255,255,255,0.02)),
        var(--glass);
      backdrop-filter: blur(18px) saturate(1.35);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.22),
        0 14px 42px rgba(2, 8, 35, 0.38),
        0 0 30px rgba(133, 162, 255, 0.16);
      color: rgba(248, 251, 255, 0.92);
      font-size: 15px;
      letter-spacing: 0.08em;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      text-shadow: 0 0 14px rgba(190, 230, 255, 0.55);
    }

    .hud-block.left { justify-self: start; }
    .hud-block.center { justify-self: center; }
    .hud-block.right { justify-self: end; }

    .hud-icon {
      width: 22px;
      height: 22px;
      display: inline-grid;
      place-items: center;
      filter: drop-shadow(0 0 10px rgba(210, 230, 255, 0.85));
    }

    .hud-value {
      font-size: 23px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0.02em;
      color: white;
    }

    .camera-badge {
      position: fixed;
      top: 84px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 11;
      padding: 9px 14px;
      border-radius: 999px;
      border: 1px solid rgba(226, 236, 255, 0.22);
      background: rgba(9, 13, 42, 0.42);
      backdrop-filter: blur(16px) saturate(1.2);
      box-shadow: 0 14px 36px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.14);
      color: rgba(238, 246, 255, 0.76);
      font-size: 13px;
      letter-spacing: 0.07em;
      pointer-events: none;
      text-shadow: 0 0 14px rgba(190, 230, 255, 0.42);
    }

    body.hand-active .camera-badge {
      color: rgba(255,255,255,0.92);
      border-color: rgba(199, 244, 255, 0.34);
      box-shadow: 0 14px 36px rgba(0,0,0,0.25), 0 0 24px rgba(145, 225, 255, 0.18), inset 0 1px 0 rgba(255,255,255,0.16);
    }

    .progress-hud {
      position: fixed;
      left: 50%;
      bottom: 78px;
      transform: translateX(-50%);
      z-index: 9;
      width: min(610px, calc(100vw - 40px));
      padding: 15px 20px;
      border-radius: 30px;
      border: 1px solid rgba(233, 239, 255, 0.30);
      background:
        radial-gradient(circle at 14% 12%, rgba(255,255,255,0.18), transparent 22%),
        radial-gradient(circle at 88% 18%, rgba(255, 227, 176, 0.10), transparent 18%),
        linear-gradient(140deg, rgba(255,255,255,0.13), rgba(255,255,255,0.03)),
        rgba(8, 12, 36, 0.56);
      box-shadow:
        0 22px 72px rgba(0, 0, 0, 0.38),
        0 0 64px rgba(170, 146, 255, 0.16),
        0 0 28px rgba(255, 226, 176, 0.07),
        inset 0 1px 0 rgba(255,255,255,0.18),
        inset 0 -22px 36px rgba(10, 15, 48, 0.22);
      backdrop-filter: blur(18px) saturate(1.3);
      pointer-events: none;
      display: grid;
      grid-template-columns: 48px 1fr 58px;
      gap: 14px;
      align-items: center;
      overflow: hidden;
    }

    .progress-hud::after {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
      pointer-events: none;
    }

    .progress-emblem {
      width: 48px;
      height: 48px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      color: white;
      font-size: 26px;
      background:
        radial-gradient(circle at 35% 28%, rgba(255,255,255,0.34), transparent 24%),
        linear-gradient(160deg, rgba(255,255,255,0.20), rgba(182, 152, 255, 0.22) 54%, rgba(69, 88, 181, 0.22));
      border: 1px solid rgba(236, 240, 255, 0.26);
      box-shadow: 0 0 34px rgba(198, 178, 255, 0.24), inset 0 1px 0 rgba(255,255,255,0.28);
      text-shadow: 0 0 18px rgba(255,255,255,0.85);
    }

    .progress-title {
      margin-bottom: 8px;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.14em;
      color: rgba(247, 250, 255, 0.94);
      text-transform: uppercase;
      text-shadow: 0 0 16px rgba(204, 229, 255, 0.42);
    }

    .progress-track {
      height: 13px;
      border-radius: 999px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(8, 14, 38, 0.82), rgba(17, 24, 56, 0.54));
      border: 1px solid rgba(226, 236, 255, 0.12);
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.30), inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background:
        linear-gradient(90deg, #8e79ff, #cbc4ff 45%, #fff1c9 72%, #ddfff2);
      box-shadow: 0 0 24px rgba(202, 178, 255, 0.68), inset 0 1px 0 rgba(255,255,255,0.32);
      transition: width 260ms ease;
    }

    .progress-percent {
      text-align: right;
      font-weight: 900;
      font-size: 15px;
      color: rgba(255,255,255,0.92);
      letter-spacing: 0.06em;
      text-shadow: 0 0 16px rgba(190, 230, 255, 0.5);
    }

    .hint {
      position: fixed;
      left: 50%;
      bottom: 26px;
      transform: translateX(-50%);
      z-index: 9;
      min-width: min(490px, calc(100vw - 40px));
      padding: 12px 18px;
      border-radius: 18px;
      border: 1px solid rgba(226, 236, 255, 0.22);
      background:
        radial-gradient(circle at 20% 0%, rgba(255,255,255,0.10), transparent 24%),
        linear-gradient(140deg, rgba(255,255,255,0.10), rgba(255,255,255,0.03)),
        rgba(9, 13, 42, 0.44);
      box-shadow: 0 18px 54px rgba(0, 0, 0, 0.26), 0 0 24px rgba(158, 186, 255, 0.10), inset 0 1px 0 rgba(255,255,255,0.13);
      backdrop-filter: blur(16px) saturate(1.15);
      text-align: center;
      color: rgba(238, 246, 255, 0.82);
      font-size: 13px;
      letter-spacing: 0.08em;
      pointer-events: none;
    }

    .center-panel {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      pointer-events: none;
      background: radial-gradient(circle at 50% 42%, rgba(101, 123, 255, 0.14), rgba(0,0,0,0) 42%);
    }

    .card {
      width: min(560px, calc(100vw - 40px));
      padding: 38px 36px 34px;
      border-radius: 36px;
      background:
        radial-gradient(circle at 15% 12%, rgba(255,255,255,0.14), transparent 22%),
        radial-gradient(circle at 84% 0%, rgba(255, 231, 184, 0.10), transparent 20%),
        linear-gradient(145deg, rgba(255,255,255,0.13), rgba(255,255,255,0.03)),
        rgba(9, 13, 42, 0.74);
      border: 1px solid rgba(228, 238, 255, 0.30);
      box-shadow:
        0 30px 110px rgba(0, 0, 0, 0.50),
        0 0 100px rgba(123, 151, 255, 0.20),
        0 0 30px rgba(255, 225, 170, 0.08),
        inset 0 1px 0 rgba(255,255,255,0.22),
        inset 0 -30px 44px rgba(11, 15, 46, 0.24);
      backdrop-filter: blur(24px) saturate(1.3);
      text-align: center;
      pointer-events: auto;
      overflow: hidden;
      position: relative;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -80px;
      background:
        radial-gradient(circle at 20% 10%, rgba(191,247,255,0.22), transparent 24%),
        radial-gradient(circle at 86% 0%, rgba(255,214,246,0.18), transparent 26%);
      pointer-events: none;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.08);
      pointer-events: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .card > * {
      position: relative;
      z-index: 1;
    }

    .card h1 {
      font-size: clamp(36px, 6vw, 54px);
      margin-bottom: 12px;
      font-weight: 900;
      letter-spacing: 0.12em;
      background: linear-gradient(135deg, #fff, #cdefff 42%, #f4d7ff 76%, #ffe8b0);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 36px rgba(190, 230, 255, 0.22);
    }

    .card p {
      color: rgba(234, 242, 255, 0.78);
      line-height: 1.86;
      margin-bottom: 25px;
      font-size: 15px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 14px 28px;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.06em;
      color: #061226;
      background: linear-gradient(135deg, var(--cyan), #efe5ff 48%, var(--pink));
      box-shadow: 0 0 34px rgba(190, 225, 255, 0.45), inset 0 1px 0 rgba(255,255,255,0.75);
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 46px rgba(218, 231, 255, 0.62), inset 0 1px 0 rgba(255,255,255,0.82);
    }

    .secondary-btn {
      color: rgba(246, 250, 255, 0.92);
      background:
        linear-gradient(135deg, rgba(255,255,255,0.16), rgba(255,255,255,0.04)),
        rgba(29, 35, 86, 0.62);
      border: 1px solid rgba(226, 236, 255, 0.28);
      box-shadow: 0 0 28px rgba(146, 170, 255, 0.18), inset 0 1px 0 rgba(255,255,255,0.18);
    }

    .level-select {
      margin-top: 22px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .level-chip {
      padding: 13px 12px;
      border-radius: 20px;
      border: 1px solid rgba(226, 236, 255, 0.18);
      background:
        linear-gradient(145deg, rgba(255,255,255,0.09), rgba(255,255,255,0.03)),
        rgba(255,255,255,0.03);
      color: rgba(230, 241, 255, 0.74);
      cursor: pointer;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, box-shadow 160ms ease;
      font-size: 12px;
      line-height: 1.4;
      letter-spacing: 0.03em;
      text-align: left;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .level-chip strong {
      display: block;
      margin-bottom: 3px;
      color: rgba(255,255,255,0.9);
      font-size: 13px;
    }

    .level-chip span {
      display: block;
      color: rgba(220, 232, 255, 0.58);
      font-size: 11px;
    }

    .level-chip:hover {
      transform: translateY(-1px);
      border-color: rgba(210, 232, 255, 0.34);
      background: rgba(255,255,255,0.085);
    }

    .level-chip.active {
      border-color: rgba(255, 232, 178, 0.36);
      background: rgba(255, 226, 160, 0.08);
      box-shadow: 0 0 24px rgba(255, 226, 160, 0.12), inset 0 1px 0 rgba(255,255,255,0.14);
    }

    .result-card {
      width: min(620px, calc(100vw - 40px));
    }

    .result-badge {
      width: fit-content;
      margin: 0 auto 14px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 236, 180, 0.34);
      background: linear-gradient(145deg, rgba(255, 232, 178, 0.12), rgba(255,255,255,0.04));
      color: rgba(255, 239, 194, 0.92);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-shadow: 0 0 18px rgba(255, 225, 165, 0.42);
      box-shadow: 0 0 26px rgba(255, 225, 165, 0.12), inset 0 1px 0 rgba(255,255,255,0.15);
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin: 20px 0 16px;
    }

    .result-stat {
      padding: 14px 12px;
      border-radius: 20px;
      border: 1px solid rgba(226, 236, 255, 0.16);
      background:
        linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03)),
        rgba(255,255,255,0.03);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
    }

    .result-stat span {
      display: block;
      margin-bottom: 7px;
      color: rgba(220, 232, 255, 0.62);
      font-size: 12px;
      letter-spacing: 0.08em;
    }

    .result-stat strong {
      display: block;
      color: white;
      font-size: 24px;
      line-height: 1;
      text-shadow: 0 0 18px rgba(205, 232, 255, 0.45);
    }

    .result-stars {
      margin: 12px 0 24px;
      color: rgba(255, 230, 169, 0.98);
      font-size: 36px;
      letter-spacing: 0.20em;
      text-shadow: 0 0 26px rgba(255, 226, 160, 0.60);
    }

    .result-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .result-card.chapter-finale {
      border-color: rgba(255, 233, 184, 0.34);
      box-shadow:
        0 34px 120px rgba(0, 0, 0, 0.52),
        0 0 120px rgba(255, 221, 170, 0.14),
        0 0 90px rgba(123, 151, 255, 0.18),
        inset 0 1px 0 rgba(255,255,255,0.22),
        inset 0 -30px 44px rgba(11, 15, 46, 0.24);
    }

    .result-card.chapter-finale::before {
      background:
        radial-gradient(circle at 18% 10%, rgba(255,255,255,0.20), transparent 22%),
        radial-gradient(circle at 84% 0%, rgba(255, 225, 170, 0.20), transparent 24%),
        radial-gradient(circle at 50% 120%, rgba(190, 244, 255, 0.14), transparent 28%);
    }

    .result-card.chapter-finale .result-badge {
      border-color: rgba(255, 233, 184, 0.44);
      background: linear-gradient(145deg, rgba(255, 232, 178, 0.16), rgba(255,255,255,0.04));
      box-shadow: 0 0 32px rgba(255, 225, 165, 0.16), inset 0 1px 0 rgba(255,255,255,0.16);
    }

    .result-card.chapter-finale h1 {
      background: linear-gradient(135deg, #fff, #fff1c9 34%, #cdefff 62%, #f4d7ff 86%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 42px rgba(255, 228, 178, 0.20);
    }

    .result-card.chapter-finale .result-stars {
      font-size: 40px;
      text-shadow: 0 0 28px rgba(255, 226, 160, 0.68);
    }

    .hidden { display: none; }

    @media (max-width: 720px) {
      .hud {
        top: 14px;
        left: 12px;
        right: 12px;
        gap: 8px;
      }

      .hud-block {
        min-width: auto;
        padding: 9px 10px;
        font-size: 12px;
        gap: 6px;
      }

      .hud-value { font-size: 18px; }

      .progress-hud {
        bottom: 62px;
        grid-template-columns: 34px 1fr 44px;
        gap: 9px;
        padding: 10px 12px;
        border-radius: 22px;
      }

      .progress-emblem {
        width: 34px;
        height: 34px;
        border-radius: 12px;
        font-size: 20px;
      }

      .progress-title { font-size: 12px; }
      .progress-track { height: 9px; }
      .progress-percent { font-size: 12px; }

      .hint {
        bottom: 16px;
        font-size: 12px;
      }

      .level-select {
        grid-template-columns: 1fr;
      }

      .result-grid {
        grid-template-columns: 1fr;
      }

      .result-stars {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <video id="camera" autoplay playsinline muted></video>
  <audio id="bgm" src="paper_lantern_dawn.mp3" preload="auto" loop></audio>

  <div class="hud">
    <div class="hud-block left"><span class="hud-icon">✦</span>星尘 <span id="score" class="hud-value">0</span></div>
    <div class="hud-block center"><span class="hud-icon">◌</span>连击 <span id="combo" class="hud-value">0</span></div>
    <div class="hud-block right"><span class="hud-icon">◷</span>时间 <span id="time" class="hud-value">60</span>s</div>
  </div>

  <div id="cameraBadge" class="camera-badge">手势：点击进入后启用摄像头</div>

  <div class="progress-hud">
    <div class="progress-emblem">✧</div>
    <div class="progress-body">
      <div id="objectiveTitle" class="progress-title">唤醒花园核心</div>
      <div class="progress-track"><div id="coreFill" class="progress-fill"></div></div>
    </div>
    <div id="corePercent" class="progress-percent">0%</div>
  </div>

  <div class="hint">移动光灵收集星尘，避开黑雾，唤醒花园核心</div>

  <div id="startPanel" class="center-panel">
    <div class="card">
      <h1>光之庭院</h1>
      <p>
        第一章 · 初醒花园<br />
        点击进入后允许摄像头，用食指引导光灵，收集星尘并避开黑雾。鼠标和触控会作为备用控制。
      </p>
      <button id="startBtn">进入庭院</button>
      <div id="levelSelect" class="level-select"></div>
    </div>
  </div>

  <div id="endPanel" class="center-panel hidden">
    <div class="card result-card">
      <div id="resultBadge" class="result-badge">第一关完成</div>
      <h1 id="resultTitle">庭院苏醒</h1>
      <p id="resultText">你收集了 0 个星尘。</p>
      <div class="result-grid">
        <div class="result-stat"><span>星尘</span><strong id="resultScore">0</strong></div>
        <div class="result-stat"><span>最高连击</span><strong id="resultCombo">0</strong></div>
        <div class="result-stat"><span>用时</span><strong id="resultTime">60s</strong></div>
      </div>
      <div id="resultStars" class="result-stars">☆☆☆</div>
      <div class="result-actions">
        <button id="restartBtn">再来一次</button>
        <button id="nextBtn" class="secondary-btn">下一关</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { FilesetResolver, HandLandmarker } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const cameraVideo = document.getElementById("camera");
    const bgmAudio = document.getElementById("bgm");

    const scoreEl = document.getElementById("score");
    const comboEl = document.getElementById("combo");
    const timeEl = document.getElementById("time");
    const startPanel = document.getElementById("startPanel");
    const endPanel = document.getElementById("endPanel");
    const levelSelect = document.getElementById("levelSelect");
    const resultText = document.getElementById("resultText");
    const resultTitle = document.getElementById("resultTitle");
    const resultBadge = document.getElementById("resultBadge");
    const resultScore = document.getElementById("resultScore");
    const resultCombo = document.getElementById("resultCombo");
    const resultTime = document.getElementById("resultTime");
    const resultStars = document.getElementById("resultStars");
    const startBtn = document.getElementById("startBtn");
    const restartBtn = document.getElementById("restartBtn");
    const nextBtn = document.getElementById("nextBtn");
    const resultCard = document.querySelector(".result-card");
    const coreFillEl = document.getElementById("coreFill");
    const corePercentEl = document.getElementById("corePercent");
    const objectiveTitleEl = document.getElementById("objectiveTitle");
    const cameraBadge = document.getElementById("cameraBadge");

    const TAU = Math.PI * 2;

    const LEVEL_MODES = {
      1: "collect",
      2: "constellation",
      3: "defense"
    };

    function getLevelMode(level = state?.level || 1) {
      return LEVEL_MODES[level] || "collect";
    }

    function isCollectLevel() {
      return getLevelMode() === "collect";
    }

    function isConstellationLevel() {
      return getLevelMode() === "constellation";
    }

    function isDefenseLevel() {
      return getLevelMode() === "defense";
    }

    const LEVELS = {
      1: {
        id: 1,
        name: "初醒花园",

      state.width = window.innerWidth;

      canvas.height = Math.floor(state.height * dpr);

    function normalizeLevel(level) {
      const numeric = Number.isFinite(level) ? level : 1;
      return LEVELS[numeric] && !LEVELS[numeric].locked ? numeric : 1;
    }

      startPanel.querySelector("p").innerHTML = config.intro;
      startBtn.textContent = normalized === 1 ? "进入庭院" : "开始关卡";

    function renderLevelSelect() {
      if (!levelSelect) return;
      levelSelect.innerHTML = "";
      const labels = {
        1: "收集 / 躲避",
        2: "牵引 / 连线",
        3: "防守 / 净化"
      };
      for (const id of Object.keys(LEVELS).map(Number).sort((a, b) => a - b)) {
        const config = LEVELS[id];
        if (config.locked) continue;
        const chip = document.createElement("button");
        chip.type = "button";
        chip.className = `level-chip ${state.selectedLevel === id ? "active" : ""}`;
        chip.dataset.level = String(id);
        chip.innerHTML = `<strong>${id}. ${config.name}</strong><span>${labels[id] || config.chapter}</span>`;
        chip.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();
          state.selectedLevel = id;
          updateStartPanel(id);
        });
        levelSelect.appendChild(chip);
      }

    function initAudio() {
      if (!state.audio || !state.audio.enabled) return;
      try {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return;

        if (!state.audio.ctx) {
          const audioCtx = new AudioContextClass();

          const master = audioCtx.createGain();
          master.gain.value = 0.42;

          const compressor = audioCtx.createDynamicsCompressor();
          compressor.threshold.value = -22;
          compressor.knee.value = 18;
          compressor.ratio.value = 3;
          compressor.attack.value = 0.018;
          compressor.release.value = 0.28;

          const musicBus = audioCtx.createGain();
          musicBus.gain.value = 0.0;

          const sfxBus = audioCtx.createGain();
          sfxBus.gain.value = 0.86;

          const delay = audioCtx.createDelay(1.6);
          delay.delayTime.value = 0.42;
          const delayFeedback = audioCtx.createGain();
          delayFeedback.gain.value = 0.10;
          const delayWet = audioCtx.createGain();
          delayWet.gain.value = 0.055;
          delay.connect(delayFeedback);
          delayFeedback.connect(delay);
          delay.connect(delayWet);

          const reverb = audioCtx.createConvolver();
          reverb.buffer = createReverbBuffer(audioCtx, 3.2, 2.55);
          const reverbWet = audioCtx.createGain();
          reverbWet.gain.value = 0.065;
          reverb.connect(reverbWet);

          musicBus.connect(master);
          sfxBus.connect(master);
          musicBus.connect(delay);
          sfxBus.connect(delay);
          musicBus.connect(reverb);
          sfxBus.connect(reverb);
          delayWet.connect(master);
          reverbWet.connect(master);
          master.connect(compressor);
          compressor.connect(audioCtx.destination);

          state.audio.ctx = audioCtx;
          state.audio.master = master;
          state.audio.musicBus = musicBus;
          state.audio.sfxBus = sfxBus;
          state.audio.reverb = reverb;
          state.audio.delay = delay;
        }

        if (state.audio.ctx.state === "suspended") state.audio.ctx.resume();
        startExternalBgm();
        updateMusicMood(true);
      } catch (error) {
        console.warn("Audio unavailable", error);
        state.audio.enabled = false;
      }
    }

    function createReverbBuffer(audioCtx, duration = 2.2, decay = 1.8) {
      const length = Math.floor(audioCtx.sampleRate * duration);
      const buffer = audioCtx.createBuffer(2, length, audioCtx.sampleRate);
      for (let channel = 0; channel < 2; channel++) {
        const data = buffer.getChannelData(channel);
        for (let i = 0; i < length; i++) {
          const t = i / length;
          const env = Math.pow(1 - t, decay);
          data[i] = (Math.random() * 2 - 1) * env * 0.42;
        }
      }
      return buffer;
    }

    function audioNow() {
      return state.audio && state.audio.ctx ? state.audio.ctx.currentTime : 0;
    }

    function startExternalBgm() {
      if (!bgmAudio || !state.audio) return;
      state.audio.externalBgm = bgmAudio;
      bgmAudio.loop = true;
      bgmAudio.volume = 0;
      bgmAudio.playbackRate = 1;
      const playPromise = bgmAudio.play();
      if (playPromise && typeof playPromise.catch === "function") {
        playPromise.catch((error) => {
          console.warn("Background music playback was blocked until user interaction.", error);
        });
      }
      state.audio.externalBgmStarted = true;
    }

    function updateExternalBgm(force = false) {
      if (!bgmAudio || !state.audio.externalBgmStarted) return;
      const level = state.level || 1;
      const base = state.running ? 0.18 : 0.10;
      const levelTrim = level === 3 ? -0.035 : level === 2 ? -0.015 : 0;
      const target = clamp(base + levelTrim, 0, 0.22);
      state.audio.targetBgmVolume = target;
      if (force) {
        bgmAudio.volume = target;
        return;
      }
      bgmAudio.volume += (target - bgmAudio.volume) * 0.035;
      // 音量层级：背景音乐作为托底，音效作为前景。
    // BGM 目标音量约 0.15–0.18，SFX bus 约 0.86，确保收集/连线/净化音效明显高于背景音乐。
}

    function startLightMusic() {
      const audioCtx = state.audio.ctx;
      if (!audioCtx || !state.audio.musicBus || state.audio.musicStarted) return;
      state.audio.musicStarted = true;

      createSoftPad();
      scheduleMusicPhrase();
      state.audio.musicTimer = window.setInterval(scheduleMusicPhrase, 24000);

    function createSoftPad() {
      const audioCtx = state.audio.ctx;
      if (!audioCtx || !state.audio.musicBus || state.audio.padNodes.length) return;
      const now = audioCtx.currentTime;

      // 治愈主题音乐：只保留很薄的中高频“空气弦乐”，不再用厚低音 Pad。
      const notes = [293.66, 369.99, 440.00, 554.37, 659.25]; // D4, F#4, A4, C#5, E5
      notes.forEach((freq, index) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();
        const lfo = audioCtx.createOscillator();
        const lfoGain = audioCtx.createGain();
        const panner = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : null;

        osc.type = index % 2 ? "sine" : "triangle";
        osc.frequency.setValueAtTime(freq, now);
        osc.detune.setValueAtTime((index - 2) * 1.0, now);

        filter.type = "lowpass";
        filter.frequency.setValueAtTime(2450 + index * 180, now);
        filter.Q.setValueAtTime(0.24, now);

        lfo.type = "sine";
        lfo.frequency.setValueAtTime(0.018 + index * 0.003, now);
        lfoGain.gain.setValueAtTime(0.75 + index * 0.18, now);
        lfo.connect(lfoGain);
        lfoGain.connect(osc.detune);

        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.linearRampToValueAtTime(0.0024 + index * 0.00030, now + 4.8 + index * 0.32);

        osc.connect(filter);
        filter.connect(gain);
        if (panner) {
          panner.pan.setValueAtTime(-0.36 + index * 0.18, now);
          gain.connect(panner);
          panner.connect(state.audio.musicBus);
        } else {
          gain.connect(state.audio.musicBus);
        }
        osc.start(now);
        lfo.start(now);
        state.audio.padNodes.push({ osc, gain, filter, lfo, lfoGain, panner, base: freq, index });
      });
    }

    function updateMusicMood(force = false) {
      if (!state.audio) return;
      updateExternalBgm(force);
      if (!state.audio.ctx) return;
      const t = state.audio.ctx.currentTime;
      const level = state.level || 1;
      if (state.audio.musicBus) state.audio.musicBus.gain.setTargetAtTime(0.0, t, 0.4);
      if (state.audio.sfxBus) state.audio.sfxBus.gain.setTargetAtTime(level === 3 ? 0.16 : 0.135, t, 0.55);
    }

    function scheduleMusicPhrase() {

        { t: 1.25, n: 440.00, d: 1.05, v: 0.098 }, // A4

        { t: 14.15, n: 369.99, d: 0.88, v: 0.078 },

        { t: 3.00, tones: [277.18, 369.99, 440.00, 554.37] }, // A/C# 色彩
        { t: 6.00, tones: [246.94, 293.66, 369.99, 493.88] }, // Bm
        { t: 9.00, tones: [196.00, 293.66, 392.00, 493.88] }, // G

      const levelLift = level === 3 ? 1.015 : 1;

      // 温暖分解和弦：像轻钢琴/竖琴，不做厚 Pad。
      chords.forEach((chord, block) => {

      });

      // 主旋律：更突出、更像可以记住的主题，但仍然柔和。
      melody.forEach((note, i) => {
        const pan = -0.18 + (i % 6) * 0.072;
        const peak = note.n >= 554 || i === 2 || i === 16;
        playHealingPiano(note.n * levelLift, now + note.t, note.d, note.v * melodyGain, state.audio.musicBus, pan);
        if (peak) {
          playMusicBox(note.n * 2 * levelLift, now + note.t + 0.075, note.d * 0.82, note.v * 0.18, state.audio.musicBus, -pan * 0.6);
        }
      });

      // 轻柔回应声部：不像副旋律抢戏，只在空隙中回应主旋律。
      const replies = [
        { t: 6.85, n: 739.99 },
        { t: 13.20, n: 659.25 },
        { t: 19.85, n: 587.33 }
      ];
      replies.forEach((note, i) => {
        playMusicBox(note.n * levelLift, now + note.t, 1.32, 0.024, state.audio.musicBus, 0.22 - i * 0.18);
        playHealingPiano(note.n / 2 * levelLift, now + note.t + 0.08, 1.45, 0.012, state.audio.musicBus, -0.18 + i * 0.12);
      });

      // 第二关保留星光感；第三关只稍微加一点脉动，不变成战斗音乐。
      if (level === 2) {
        [587.33, 659.25, 739.99, 880.0].forEach((freq, i) => {
          playMusicBox(freq * 1.5, now + 10.2 + i * 0.38, 1.05, 0.016, state.audio.musicBus, 0.18 - i * 0.10);
        });
      }
      if (level === 3) {
        [293.66, 369.99, 440.00, 493.88, 440.00, 369.99].forEach((freq, i) => {
          playHealingPiano(freq * 1.5, now + 8.0 + i * 0.30, 0.84, 0.014, state.audio.musicBus, -0.18 + i * 0.07);
        });
      }

      state.audio.musicStep += 1;
    }


    function playHealingPiano(frequency, start = audioNow(), duration = 1.0, volume = 0.08, destination = null, pan = 0) {
      const audioCtx = state.audio.ctx;
      if (!audioCtx) return;
      const dest = destination || state.audio.sfxBus || state.audio.master;
      if (!dest) return;

      const body = audioCtx.createOscillator();
      const air = audioCtx.createOscillator();
      const bodyGain = audioCtx.createGain();
      const airGain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      const panner = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : null;

      body.type = "triangle";
      air.type = "sine";
      body.frequency.setValueAtTime(frequency, start);
      air.frequency.setValueAtTime(frequency * 2.004, start);

      filter.type = "lowpass";
      filter.frequency.setValueAtTime(4200, start);
      filter.frequency.exponentialRampToValueAtTime(1600, start + duration);
      filter.Q.setValueAtTime(0.38, start);

      bodyGain.gain.setValueAtTime(0.0001, start);
      bodyGain.gain.exponentialRampToValueAtTime(volume, start + 0.032);
      bodyGain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
      airGain.gain.setValueAtTime(volume * 0.16, start);
      airGain.gain.exponentialRampToValueAtTime(0.0001, start + duration * 0.70);

      body.connect(bodyGain);
      air.connect(airGain);
      bodyGain.connect(filter);
      airGain.connect(filter);
      if (panner) {
        panner.pan.setValueAtTime(pan, start);
        filter.connect(panner);
        panner.connect(dest);
      } else {
        filter.connect(dest);
      }
      body.start(start);
      air.start(start);
      body.stop(start + duration + 0.08);
      air.stop(start + duration + 0.08);
    }

    function playSoftNoiseBurst(duration = 0.18, volume = 0.05) {
      const audioCtx = state.audio.ctx;
      if (!audioCtx || !state.audio.sfxBus) return;
      const start = audioCtx.currentTime;
      const buffer = audioCtx.createBuffer(1, Math.max(1, Math.floor(audioCtx.sampleRate * duration)), audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 1.7);
      const source = audioCtx.createBufferSource();
      const filter = audioCtx.createBiquadFilter();
      const gain = audioCtx.createGain();
      source.buffer = buffer;
      filter.type = "bandpass";
      filter.frequency.setValueAtTime(520, start);
      filter.frequency.exponentialRampToValueAtTime(140, start + duration);
      filter.Q.setValueAtTime(0.8, start);
      gain.gain.setValueAtTime(volume, start);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
      source.connect(filter);
      filter.connect(gain);
      gain.connect(state.audio.sfxBus);
      source.start(start);
    }

    function endGame(completed = false) {
      if (!state.running) return;
      state.running = false;

      const scoreStars = getStarRating(completed);
      const usedTime = Math.ceil(state.elapsedTime);

      const failedByCore = !completed && state.core <= 0 && state.elapsedTime > 2;
      const config = getLevelConfig(state.level);
      const chapterComplete = completed && state.level === 3;
      resultCard.classList.toggle("chapter-finale", chapterComplete);
      resultBadge.textContent = chapterComplete ? "第一章 · 完成" : completed ? config.completedBadge : failedByCore ? config.failCoreBadge : config.timeoutBadge;
      resultTitle.textContent = chapterComplete ? "光之庭院 · 觉醒" : completed ? config.completedTitle : failedByCore ? config.failCoreTitle : config.timeoutTitle;
      resultText.textContent = chapterComplete
        ? `你完成了初醒花园、星座回廊与核心守护。星光已在花园中重新流动——第一章的旅程，以温柔而完整的方式闭环。`
        : completed ? config.completedText : failedByCore ? config.failCoreText : config.timeoutText;
      resultScore.textContent = state.score;
      resultCombo.textContent = state.bestCombo;
      resultTime.textContent = `${usedTime}s`;
      resultStars.textContent = chapterComplete
        ? "✦✦✦"
        : "★".repeat(scoreStars) + "☆".repeat(3 - scoreStars);
      const nextLevel = getNextPlayableLevel(state.level);
      nextBtn.style.display = completed && nextLevel ? "inline-block" : "none";
      if (nextLevel) nextBtn.textContent = `下一关：${getLevelConfig(nextLevel).name}`;
      if (chapterComplete) {
        nextBtn.style.display = "inline-block";
        nextBtn.textContent = "返回关卡选择";
      }

      endPanel.classList.remove("hidden");
      requestAnimationFrame(idleLoop);
    }

    function getNextPlayableLevel(level) {
      const next = level + 1;
      return LEVELS[next] && !LEVELS[next].locked ? next : null;
    }

    function getStarRating(completed) {
      if (!completed) return Math.max(1, state.score >= 25 ? 2 : 1);
      if (isConstellationLevel() && state.constellation.segmentGrades.length > 0) {
        const averageGrade = state.constellation.segmentGrades.reduce((sum, grade) => sum + grade.score, 0) / state.constellation.segmentGrades.length;
        if (averageGrade >= 2.65) return 3;
        if (averageGrade >= 1.85) return 2;
        return 1;
      }
      let stars = 1;
      if (state.bestCombo >= 10 || state.elapsedTime <= 45) stars += 1;
      if (state.score >= 42 && state.elapsedTime <= 55) stars += 1;
      return clamp(stars, 1, 3);
    }

      const corePoint = getCorePoint();
      addParticles(corePoint.x, corePoint.y, 90, true);
      playCompletionMelody();
      for (const flower of state.flowers) flower.bloom = Math.max(flower.bloom, 1.25);

      window.setTimeout(() => {

    function getRoutePoint(index, jitter = true) {
      const w = state.width;
      const h = state.height;
      const route = [
        [0.24, 0.80], [0.34, 0.72], [0.46, 0.64], [0.59, 0.57],
        [0.72, 0.60], [0.82, 0.70], [0.74, 0.82], [0.58, 0.84],
        [0.42, 0.80], [0.28, 0.68], [0.38, 0.56], [0.52, 0.50],
        [0.66, 0.54], [0.76, 0.66], [0.62, 0.74], [0.46, 0.70]
      ];
      const p = route[index % route.length];
      return {
        x: p[0] * w + (jitter ? rand(-46, 46) : 0),
        y: p[1] * h + (jitter ? rand(-30, 30) : 0)
      };
    }

    function spawnStar(initial = false) {
      const point = getRoutePoint(state.routeIndex++, true);
      state.stars.push({
        x: clamp(point.x, state.width * 0.12, state.width * 0.88),

        r: rand(12, 17),
        phase: Math.random() * TAU,
        vx: rand(-5, 5),
        vy: rand(-4, 4),
        life: initial ? 1 : 0,
        spin: rand(-1.2, 1.2),
        kind: Math.random() > 0.78 ? "gold" : "crystal"

        : [
            [0.20, 0.62, 32, 0.72],
            [0.38, 0.76, 28, 0.88],
            [0.61, 0.58, 34, 0.68],
            [0.80, 0.72, 30, 0.82],
            [0.55, 0.87, 26, 0.96]
          ];
      state.fogs = seeds.map(([x, y, r, speed], index) => ({
        x: x * state.width,
        y: y * state.height,
        ox: x * state.width,
        oy: y * state.height,
        r: r * clamp(state.width / 1200, 0.78, 1.18),
        phase: index * 1.9 + Math.random() * TAU,
        speed,
        driftX: rand(42, 92),
        driftY: rand(22, 54),
        hitPulse: 0,
        purifyPulse: 0,
        purifiedTimer: 0
      }));
    }

    function updateCoreHud() {
      const percent = clamp(Math.round((state.core / state.coreTarget) * 100), 0, 100);
      coreFillEl.style.width = percent + "%";
      corePercentEl.textContent = percent + "%";
      objectiveTitleEl.textContent = getObjectiveText();
    }

    function getObjectiveText() {
      if (isConstellationLevel()) return "连接星座回廊";
      if (isDefenseLevel()) return "守护花园核心";
      return "唤醒花园核心";
    }

    function updateLevelHint() {
      const config = getLevelConfig(state.level);
      if (isConstellationLevel()) {
        const total = state.constellation.nodes.length || 6;
        const current = clamp(state.constellation.current + 1, 1, total);
        const resonance = state.constellation.resonanceMax > 0
          ? Math.round((state.constellation.resonance / state.constellation.resonanceMax) * 100)
          : Math.round(state.constellation.beamStability * 100);
        const node = state.constellation.nodes[state.constellation.current];
        const mode = getNodeTypeLabel(node);
        const graceText = state.constellation.graceTimer > 0 ? " · 调整中" : "";
        document.querySelector(".hint").textContent = state.constellation.completed
          ? "第2关 · 星座完成 · 月光旋律正在回响"
          : `第2关 · ${mode} · 星座 ${current}/${total} · 共鸣 ${resonance}% · 失误 ${state.constellation.mistakes}/${state.constellation.maxMistakes}${graceText}`;
      } else if (isDefenseLevel()) {
        const remain = Math.max(0, Math.ceil(state.defense.duration - state.defense.survived));
        document.querySelector(".hint").textContent = `第3关 · 守护核心 · 剩余 ${remain}s · 第${state.defense.wave}波 · 已净化 ${state.defense.purified}`;
      } else {
        const percent = clamp(Math.round((state.core / state.coreTarget) * 100), 0, 100);
        document.querySelector(".hint").textContent = `第1关 · 收集星尘 · 避开黑雾 · 核心 ${percent}%`;
      }
    }

    function setCameraStatus(text, active = false) {
      cameraBadge.textContent = text;
      document.body.classList.toggle("hand-active", active);
    }

    async function initHandTracking() {
      if (state.hand.ready || state.hand.initializing) return;

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setCameraStatus("手势：浏览器不支持摄像头，使用鼠标/触控");
        return;
      }

      state.hand.initializing = true;
      setCameraStatus("手势：正在加载识别模型…");

      try {
        const vision = await FilesetResolver.forVisionTasks(
          "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
        );

        state.hand.landmarker = await HandLandmarker.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
            delegate: "GPU"
          },
          runningMode: "VIDEO",
          numHands: 1,
          minHandDetectionConfidence: 0.55,
          minHandPresenceConfidence: 0.55,
          minTrackingConfidence: 0.5
        });

        setCameraStatus("手势：正在请求摄像头权限…");
        state.hand.stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "user",
            width: { ideal: 960 },
            height: { ideal: 540 }
          },
          audio: false
        });

        cameraVideo.srcObject = state.hand.stream;
        await cameraVideo.play();

        state.hand.ready = true;
        state.hand.enabled = true;
        state.hand.source = "hand";
        document.body.classList.add("camera-ready");
        setCameraStatus("手势：食指控制光灵");
      } catch (error) {
        console.warn("Hand tracking unavailable, falling back to mouse/touch.", error);
        state.hand.enabled = false;
        state.hand.ready = false;
        state.hand.source = "mouse";
        setCameraStatus("手势：不可用，已切换鼠标/触控");
      } finally {
        state.hand.initializing = false;
      }
    }

    function updateHandControl(now) {
      if (!state.hand.ready || !state.hand.landmarker || cameraVideo.readyState < 2) return;
      if (cameraVideo.currentTime === state.hand.lastVideoTime) return;
      state.hand.lastVideoTime = cameraVideo.currentTime;

      let result;
      try {
        result = state.hand.landmarker.detectForVideo(cameraVideo, now);
      } catch (error) {
        console.warn("Hand detection frame failed", error);
        return;
      }

      const landmarks = result.landmarks && result.landmarks[0];
      if (!landmarks || !landmarks[8]) {
        state.hand.active = false;
        state.hand.lostTimer += 1;
        state.gesture.grabbing = state.pointer.mouseDown && state.level === 2;
        state.gesture.grabStrength = state.gesture.grabbing ? 1 : 0;
        state.gesture.source = state.gesture.grabbing ? "mouse" : "none";
        if (state.hand.lostTimer > 18) setCameraStatus("手势：未识别到手，鼠标按住可模拟抓取");
        document.body.classList.remove("hand-active");
        return;
      }

      const indexTip = landmarks[8];
      const thumbTip = landmarks[4];
      const middleTip = landmarks[12];
      const wrist = landmarks[0];
      const pinchDistance = thumbTip ? Math.hypot(thumbTip.x - indexTip.x, thumbTip.y - indexTip.y) : 1;
      const palmDistance = wrist && middleTip ? Math.hypot(middleTip.x - wrist.x, middleTip.y - wrist.y) : 0.22;
      const normalizedPinch = palmDistance > 0 ? pinchDistance / palmDistance : pinchDistance;
      const grabStrength = clamp(1 - (normalizedPinch - 0.12) / 0.24, 0, 1);
      state.gesture.grabbing = state.level === 2 && grabStrength > 0.72;
      state.gesture.grabStrength = state.level === 2 ? grabStrength : 0;
      state.gesture.source = "hand";

      const targetX = clamp((1 - indexTip.x) * state.width, 0, state.width);
      const targetY = clamp(indexTip.y * state.height, 0, state.height);

      state.pointer.tx += (targetX - state.pointer.tx) * 0.62;
      state.pointer.ty += (targetY - state.pointer.ty) * 0.62;
      state.hand.active = true;
      state.hand.lostTimer = 0;
      state.hand.lastSeenAt = now;
      setCameraStatus(state.gesture.grabbing ? "手势：抓取中，萤火虫聚拢" : "手势：食指控制中", true);
    }

    function addParticles(x, y, count = 26, warm = false) {
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * TAU;
        const speed = rand(30, 190);
        state.particles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          r: rand(1.5, 4.6),
          life: rand(0.55, 1.2),
          maxLife: 1.2,
          warm,
          twinkle: Math.random() * TAU
        });
      }
      state.ripples.push({ x, y, r: 8, life: 0.7, maxLife: 0.7 });
    }

    function updateCombo(dt) {
      if (state.combo <= 0) return;
      state.comboTimer -= dt;
      if (state.comboTimer <= 0) {
        state.combo = 0;
        state.comboTimer = 0;
        comboEl.textContent = state.combo;
      }
    }

    function update(dt) {
      state.timeLeft -= dt;
      state.elapsedTime += dt;
      if (state.timeLeft <= 0) {
        state.timeLeft = 0;
        timeEl.textContent = "0";
        endGame(false);
        return;
      }

      timeEl.textContent = Math.ceil(state.timeLeft);
      updateCombo(dt);
      state.corePulse = Math.max(0, state.corePulse - dt * 1.8);
      state.pointer.aura = Math.max(0, state.pointer.aura - dt * 2.4);
      state.damageCooldown = Math.max(0, state.damageCooldown - dt);
      state.completionBurst = Math.max(0, state.completionBurst - dt * 0.85);
      state.ambientHue += dt;
      updateMusicMood();

      const ease = 1 - Math.pow(0.001, dt);
      state.pointer.x += (state.pointer.tx - state.pointer.x) * ease;
      state.pointer.y += (state.pointer.ty - state.pointer.y) * ease;

      state.pointer.trail.unshift({ x: state.pointer.x, y: state.pointer.y, life: 1, width: rand(0.7, 1.25) });
      if (state.pointer.trail.length > 24) state.pointer.trail.pop();
      for (const t of state.pointer.trail) t.life -= dt * 1.9;
      state.pointer.trail = state.pointer.trail.filter(t => t.life > 0);

      if (state.level === 1) {
        state.spawnTimer -= dt;
        if (state.spawnTimer <= 0 && state.stars.length < 16) {
          spawnStar();
          state.spawnTimer = rand(0.35, 0.62);
        }
      }

      for (const fly of state.fireflies) {
        fly.phase += dt * fly.speed;
        fly.x = fly.ox + Math.sin(fly.phase * 1.7) * 24 + Math.cos(fly.phase * 0.9) * 12;
        fly.y = fly.oy + Math.cos(fly.phase * 1.2) * 18;
      }

      for (const star of state.stars) {
        star.phase += dt * (2.2 + Math.abs(star.spin));
        star.life = Math.min(1, star.life + dt * 2.6);
        star.x += star.vx * dt;
        star.y += star.vy * dt;
        if (star.x < 40 || star.x > state.width - 40) star.vx *= -1;
        if (star.y < state.height * 0.43 || star.y > state.height * 0.9) star.vy *= -1;
      }

      if (state.level === 2) updateConstellation(dt);
      if (state.level !== 2) updateSeal(dt);
      if (state.level !== 2) updateRefraction(dt);
      updateDefense(dt);
      updateFogs(dt);

      for (let i = state.stars.length - 1; i >= 0; i--) {
        const star = state.stars[i];
        const dx = star.x - state.pointer.x;
        const dy = star.y - state.pointer.y;
        const dist = Math.hypot(dx, dy);
        if (dist < star.r + 28) {
          collectStar(i, star);
        }
      }

      for (let i = state.particles.length - 1; i >= 0; i--) {
        const p = state.particles[i];
        p.life -= dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vx *= 0.975;
        p.vy *= 0.975;
        p.vy += 10 * dt;
        p.twinkle += dt * 8;
        if (p.life <= 0) state.particles.splice(i, 1);
      }

      for (let i = state.ripples.length - 1; i >= 0; i--) {
        const r = state.ripples[i];
        r.life -= dt;
        r.r += 92 * dt;
        if (r.life <= 0) state.ripples.splice(i, 1);
      }

      for (const flower of state.flowers) {
        flower.bloom *= 0.994;
        flower.phase += dt;
      }
    }

    function setupConstellationLevel() {
      if (typeof createConstellation !== "function") {
        console.warn("createConstellation is missing; using fallback constellation setup.");
        state.constellation.nodes = [];
        const points = [[0.30, 0.73], [0.43, 0.58], [0.58, 0.67], [0.72, 0.54], [0.63, 0.79], [0.46, 0.83]];
        state.constellation.nodes = points.map(([x, y], index) => ({
          x: x * state.width,
          y: y * state.height,
          index,
          lit: index === 0,
          pulse: Math.random() * TAU,
          touchPulse: index === 0 ? 1 : 0
        }));
        state.constellation.current = 1;
        state.constellation.beamStability = 1;
        state.constellation.beamCharge = 0;
        state.constellation.rifts = [];
        state.constellation.segmentGrades = [];
      } else {
        createConstellation();
      }
      state.core = clamp((1 / state.constellation.nodes.length) * state.coreTarget, 0, state.coreTarget);
      state.timeLeft = 70;
      updateCoreHud();
      updateLevelHint();
    }

    function setupDefenseLevel() {
      state.core = state.coreTarget;
      state.timeLeft = state.defense.duration;
      timeEl.textContent = Math.ceil(state.timeLeft);
      updateCoreHud();
      updateLevelHint();
      for (let i = 0; i < 5; i++) spawnDefenseEnemy(i * 0.75);
    }

    function getDefenseCorePoint() {
      const p = getCorePoint();
      return { x: p.x, y: p.y + 14 };
    }

    function spawnDefenseEnemy(delay = 0) {
      const side = Math.floor(Math.random() * 4);
      const margin = 70;
      let x, y;
      if (side === 0) { x = rand(margin, state.width - margin); y = -margin; }
      else if (side === 1) { x = state.width + margin; y = rand(state.height * 0.43, state.height * 0.96); }
      else if (side === 2) { x = rand(margin, state.width - margin); y = state.height + margin; }
      else { x = -margin; y = rand(state.height * 0.43, state.height * 0.96); }

      const elapsed = state.defense.survived;
      const pressure = clamp(elapsed / state.defense.duration, 0, 1);
      const roll = Math.random();
      const type = roll < 0.28 + pressure * 0.12 ? "swift" : roll > 0.86 ? "heavy" : "normal";
      const baseScale = clamp(state.width / 1200, 0.78, 1.14);
      const sizeByType = type === "swift" ? rand(16, 22) : type === "heavy" ? rand(32, 42) : rand(23, 32);
      const speedByType = type === "swift" ? rand(70, 92) : type === "heavy" ? rand(38, 52) : rand(52, 70);

      state.defense.enemies.push({
        x,
        y,
        r: sizeByType * baseScale,
        speed: speedByType + pressure * 42,
        type,
        phase: Math.random() * TAU,
        spawnDelay: delay,
        hitPulse: 0,
        warningTrail: []
      });
    }

    function updateDefense(dt) {
      if (state.level !== 3 || state.levelComplete) return;
      state.defense.survived += dt;
      state.defense.spawnTimer -= dt;
      state.defense.coreHitPulse = Math.max(0, state.defense.coreHitPulse - dt * 2.4);
      updateLevelHint();

      const pressure = clamp(state.defense.survived / state.defense.duration, 0, 1);
      state.defense.wave = 1 + Math.floor(pressure * 4);
      const spawnInterval = Math.max(0.34, 1.24 - pressure * 0.72);
      const maxEnemies = Math.floor(7 + pressure * 9);
      if (state.defense.spawnTimer <= 0 && state.defense.enemies.length < maxEnemies) {
        spawnDefenseEnemy();
        if (pressure > 0.45 && Math.random() < 0.35) spawnDefenseEnemy(0.18);
        if (pressure > 0.74 && Math.random() < 0.22) spawnDefenseEnemy(0.34);
        state.defense.spawnTimer = spawnInterval;
      }

      const core = getDefenseCorePoint();
      for (let i = state.defense.enemies.length - 1; i >= 0; i--) {
        const enemy = state.defense.enemies[i];
        if (enemy.spawnDelay > 0) {
          enemy.spawnDelay -= dt;
          continue;
        }

        enemy.phase += dt * 2;
        enemy.hitPulse = Math.max(0, enemy.hitPulse - dt * 2.5);
        enemy.warningTrail.unshift({ x: enemy.x, y: enemy.y, life: 1 });
        if (enemy.warningTrail.length > 10) enemy.warningTrail.pop();
        for (const t of enemy.warningTrail) t.life -= dt * 3.2;
        enemy.warningTrail = enemy.warningTrail.filter(t => t.life > 0);

        const dx = core.x - enemy.x;
        const dy = core.y - enemy.y;
        const dist = Math.hypot(dx, dy) || 1;
        const wobble = Math.sin(enemy.phase) * (enemy.type === "swift" ? 14 : 9);
        enemy.x += ((dx / dist) * enemy.speed + Math.cos(enemy.phase * 1.7) * wobble) * dt;
        enemy.y += ((dy / dist) * enemy.speed + Math.sin(enemy.phase * 1.3) * wobble) * dt;

        const distToPointer = Math.hypot(enemy.x - state.pointer.x, enemy.y - state.pointer.y);
        if (distToPointer < enemy.r + 30) {
          purifyDefenseEnemy(i, enemy);
          continue;
        }

        if (dist < enemy.r + 42) {
          hitDefenseCore(i, enemy);
        }
      }

      if (state.defense.survived >= state.defense.duration) {
        playCompletionMelody();
        triggerLevelComplete();
      }
    }

    function purifyDefenseEnemy(index, enemy) {
      state.defense.enemies.splice(index, 1);
      state.defense.purified += 1;
      state.score += enemy.type === "heavy" ? 4 : enemy.type === "swift" ? 3 : 2;
      state.combo += 1;
      state.comboTimer = 2.4;
      state.bestCombo = Math.max(state.bestCombo, state.combo);
      state.pointer.aura = 1.1;
      scoreEl.textContent = state.score;
      comboEl.textContent = state.combo;
      addParticles(enemy.x, enemy.y, 52, true);
      playPurifySound();
      state.ripples.push({ x: enemy.x, y: enemy.y, r: 10, life: 0.9, maxLife: 0.9 });
    }

    function hitDefenseCore(index, enemy) {
      state.defense.enemies.splice(index, 1);
      const damage = enemy.type === "heavy" ? 13 : enemy.type === "swift" ? 6 : 9;
      state.core = clamp(state.core - damage, 0, state.coreTarget);
      state.combo = 0;
      state.comboTimer = 0;
      state.defense.coreHitPulse = 1;
      state.corePulse = 1;
      comboEl.textContent = state.combo;
      updateCoreHud();
      addParticles(enemy.x, enemy.y, 30, false);
      playDamageSound();
      if (state.core <= 0) {
        window.setTimeout(() => {
          if (state.running && state.core <= 0) endGame(false);
        }, 260);
      }
    }

    function setupEscortLevel() {
      state.escort.fireflies = [];
      state.escort.currents = [];
      state.escort.collected = 0;
      state.escort.lost = 0;
      state.escort.rescued = 0;
      state.escort.pulse = 0;
      state.escort.lastBonusText = "";
      state.escort.bonusPulse = 0;

      state.escort.gate = {
        x: state.width * 0.82,
        y: state.height * 0.62,
        r: 44 * clamp(state.width / 1200, 0.82, 1.12)
      };

      spawnEscortFireflies();
      spawnShadowCurrents();
      state.core = state.coreTarget;
      state.timeLeft = 70;
      updateCoreHud();
      updateLevelHint();
    }

    function spawnEscortFireflies() {
      const clusterCenters = [
        [0.23, 0.62],
        [0.33, 0.75],
        [0.20, 0.83]
      ];

      let count = 0;
      for (const [cx, cy] of clusterCenters) {
        for (let i = 0; i < 6; i++) {
          state.escort.fireflies.push({
            x: cx * state.width + rand(-42, 42),
            y: cy * state.height + rand(-34, 34),
            vx: 0,
            vy: 0,
            r: rand(4, 6),
            phase: Math.random() * TAU,
            following: false,
            delivered: false,
            lost: false,
            panic: 0,
            scared: false,
            scaredTimer: 0,
            lastThreatX: 0,
            lastThreatY: 0
          });
          count++;
        }
      }

      state.escort.total = count;
      state.escort.target = 12;
    }

    function spawnShadowCurrents() {
      state.escort.currents = [
        { cx: state.width * 0.46, cy: state.height * 0.60, ax: 0, ay: 70, x: 0, y: 0, r: 34, speed: 0.7, phase: Math.random() * TAU },
        { cx: state.width * 0.58, cy: state.height * 0.76, ax: 88, ay: 0, x: 0, y: 0, r: 32, speed: 0.9, phase: Math.random() * TAU },
        { cx: state.width * 0.70, cy: state.height * 0.57, ax: 0, ay: 82, x: 0, y: 0, r: 36, speed: 0.8, phase: Math.random() * TAU }
      ];
    }

    function updateEscort(dt) {
      if (state.level !== 2 || state.levelComplete) return;
      state.escort.pulse = Math.max(0, state.escort.pulse - dt * 1.8);
      state.escort.bonusPulse = Math.max(0, state.escort.bonusPulse - dt * 1.4);
      updateShadowCurrents(dt);
      updateFireflies(dt);
      updateEscortGoal();
      updateLevelHint();
    }

    function updateShadowCurrents(dt) {
      for (const current of state.escort.currents) {
        current.phase += dt * current.speed;
        current.x = current.cx + Math.sin(current.phase) * current.ax;
        current.y = current.cy + Math.cos(current.phase) * current.ay;
      }
    }

    function updateFireflies(dt) {
      const gate = state.escort.gate;

      for (const fly of state.escort.fireflies) {
        if (fly.delivered || fly.lost) continue;

        fly.phase += dt * 3.2;
        fly.panic = Math.max(0, fly.panic - dt * 2.4);

        const distToPointer = Math.hypot(fly.x - state.pointer.x, fly.y - state.pointer.y);

        if (fly.scared) {
          fly.scaredTimer -= dt;
          fly.panic = Math.max(fly.panic, 0.7);
          const awayX = fly.x - fly.lastThreatX;
          const awayY = fly.y - fly.lastThreatY;
          const awayLen = Math.hypot(awayX, awayY) || 1;
          fly.vx += (awayX / awayLen) * dt * 14;
          fly.vy += (awayY / awayLen) * dt * 14;
          fly.vx *= 0.92;
          fly.vy *= 0.92;
          fly.x += fly.vx * dt * 60;
          fly.y += fly.vy * dt * 60;

          if (distToPointer < 48) {
            fly.scared = false;
            fly.following = true;
            fly.scaredTimer = 0;
            fly.panic = 0.25;
            state.escort.rescued += 1;
            state.escort.lastBonusText = "救回萤火";
            state.escort.bonusPulse = 1;
            addParticles(fly.x, fly.y, 18, true);
          } else if (fly.scaredTimer <= 0) {
            fly.lost = true;
            state.escort.lost += 1;
            addParticles(fly.x, fly.y, 18, false);
          }

          if (fly.lost) continue;
          continue;
        }

        if (!fly.following && distToPointer < 54) {
          fly.following = true;
          fly.panic = 0.4;
        }

        if (fly.following) {
          const grab = state.gesture.grabbing ? state.gesture.grabStrength : 0;
          const escortIndex = state.escort.fireflies.filter(other => other.following && !other.delivered && !other.lost).indexOf(fly);
          const ringSlot = Math.max(0, escortIndex);
          const ringAngle = fly.phase + ringSlot * 0.9;
          const orbitX = state.gesture.grabbing ? 8 + Math.cos(ringAngle) * 7 : 24 + Math.cos(ringAngle) * 12;
          const orbitY = state.gesture.grabbing ? 7 + Math.sin(ringAngle) * 6 : 20 + Math.sin(ringAngle) * 10;
          const pull = 5.2 + grab * 8.8;
          const damping = 0.88 - grab * 0.11;
          const desiredX = state.pointer.x - Math.cos(ringAngle) * orbitX;
          const desiredY = state.pointer.y - Math.sin(ringAngle * 1.2) * orbitY;
          fly.vx += (desiredX - fly.x) * dt * pull;
          fly.vy += (desiredY - fly.y) * dt * pull;
          fly.vx *= damping;
          fly.vy *= damping;
          fly.x += fly.vx * dt * 60;
          fly.y += fly.vy * dt * 60;
        } else {
          fly.x += Math.cos(fly.phase) * dt * 8;
          fly.y += Math.sin(fly.phase * 1.2) * dt * 7;
        }

        for (const current of state.escort.currents) {
          const hitDist = Math.hypot(fly.x - current.x, fly.y - current.y);
          if (hitDist < current.r + 58 && !state.gesture.grabbing && fly.following) {
            const dx = fly.x - current.x;
            const dy = fly.y - current.y;
            const len = Math.hypot(dx, dy) || 1;
            fly.vx += (dx / len) * dt * 7.5;
            fly.vy += (dy / len) * dt * 7.5;
            fly.panic = Math.max(fly.panic, 0.82);
          }
          if (hitDist < current.r + 7) {
            fly.scared = true;
            fly.following = false;
            fly.scaredTimer = 4.2;
            fly.lastThreatX = current.x;
            fly.lastThreatY = current.y;
            state.combo = 0;
            state.comboTimer = 0;
            comboEl.textContent = state.combo;
            addParticles(fly.x, fly.y, 14, false);
            break;
          } else if (hitDist < current.r + 46) {
            fly.panic = Math.max(fly.panic, state.gesture.grabbing ? 0.36 : 0.72);
          }
        }

        if (fly.lost) continue;

        const gateDist = Math.hypot(fly.x - gate.x, fly.y - gate.y);
        if (gateDist < gate.r + 14) {
          const groupNearGate = state.escort.fireflies.filter(other =>
            !other.delivered && !other.lost && !other.scared &&
            Math.hypot(other.x - gate.x, other.y - gate.y) < gate.r + 92
          ).length;
          const bonus = groupNearGate >= 7 ? 3 : groupNearGate >= 4 ? 2 : 0;
          fly.delivered = true;
          fly.following = false;
          state.escort.collected += 1;
          state.escort.pulse = 1;
          if (bonus > 0) {
            state.escort.lastBonusText = bonus === 3 ? "成群引路 +3" : "小队引路 +2";
            state.escort.bonusPulse = 1;
          }
          state.score += 2 + bonus;
          state.combo += 1;
          state.comboTimer = 2.2;
          state.bestCombo = Math.max(state.bestCombo, state.combo);
          scoreEl.textContent = state.score;
          comboEl.textContent = state.combo;
          addParticles(fly.x, fly.y, 28, true);
        }
      }
    }

    function updateEscortGoal() {
      if (state.escort.collected >= state.escort.target) {
        triggerLevelComplete();
        return;
      }

      const remainingAvailable = state.escort.fireflies.filter(fly => !fly.delivered && !fly.lost).length;
      if (state.escort.collected + remainingAvailable < state.escort.target) {
        endGame(false);
      }
    }

    function setupSealLevel() {
      const w = state.width;
      const h = state.height;
      state.seal.lake = {
        x: w * 0.5,
        y: h * 0.68,
        rx: w * 0.33,
        ry: h * 0.22
      };
      state.seal.drawing = false;
      state.seal.path = [];
      state.seal.progress = 0;
      state.seal.targetProgress = 60;
      state.seal.breakPulse = 0;
      state.seal.safePulse = 0;
      state.seal.lastGain = 0;
      state.seal.enemies = [];
      state.seal.patches = [];
      state.seal.lastGrade = "";
      state.seal.gradePulse = 0;
      state.seal.chain = 0;
      state.core = state.coreTarget;
      state.timeLeft = 70;
      for (let i = 0; i < 3; i++) spawnSealEnemy(i);
      updateCoreHud();
      updateLevelHint();
    }

    function isInsideSealLake(x, y) {
      const lake = state.seal.lake;
      const dx = (x - lake.x) / lake.rx;
      const dy = (y - lake.y) / lake.ry;
      return dx * dx + dy * dy <= 1;
    }

    function distanceToLakeBoundary(x, y) {
      const lake = state.seal.lake;
      const dx = (x - lake.x) / lake.rx;
      const dy = (y - lake.y) / lake.ry;
      const normalized = Math.sqrt(dx * dx + dy * dy);
      return Math.abs(1 - normalized) * Math.min(lake.rx, lake.ry);
    }

    function spawnSealEnemy(index = 0) {
      const lake = state.seal.lake;
      const angle = rand(0, TAU);
      const radius = rand(0.22, 0.72);
      state.seal.enemies.push({
        x: lake.x + Math.cos(angle) * lake.rx * radius,
        y: lake.y + Math.sin(angle) * lake.ry * radius,
        r: rand(18, 27) * clamp(state.width / 1200, 0.82, 1.15),
        vx: rand(-35, 35),
        vy: rand(-28, 28),
        phase: index * 2 + Math.random() * TAU,
        pulse: 0
      });
    }

    function updateSeal(dt) {
      if (state.level !== 2 || state.levelComplete) return;
      const seal = state.seal;
      seal.breakPulse = Math.max(0, seal.breakPulse - dt * 2.4);
      seal.safePulse = Math.max(0, seal.safePulse - dt * 1.8);
      seal.gradePulse = Math.max(0, seal.gradePulse - dt * 1.35);
      for (const patch of seal.patches) patch.life = Math.min(1, patch.life + dt * 1.8);

      updateSealEnemies(dt);
      updateSealDrawing(dt);

      state.core = clamp(state.core, 0, state.coreTarget);
      updateCoreHud();
      if (seal.progress >= seal.targetProgress) {
        state.core = state.coreTarget;
        updateCoreHud();
        triggerLevelComplete();
      }
    }

    function updateSealEnemies(dt) {
      const lake = state.seal.lake;
      for (const enemy of state.seal.enemies) {
        enemy.phase += dt * 1.8;
        enemy.pulse = Math.max(0, enemy.pulse - dt * 2.2);
        enemy.x += (enemy.vx + Math.cos(enemy.phase) * 16) * dt;
        enemy.y += (enemy.vy + Math.sin(enemy.phase * 1.2) * 12) * dt;

        if (!isInsideSealLake(enemy.x, enemy.y)) {
          const dx = lake.x - enemy.x;
          const dy = lake.y - enemy.y;
          const len = Math.hypot(dx, dy) || 1;
          enemy.vx += (dx / len) * 60 * dt;
          enemy.vy += (dy / len) * 60 * dt;
        }

        enemy.vx *= 0.995;
        enemy.vy *= 0.995;

        if (state.seal.drawing && state.seal.path.length > 1) {
          for (let i = 1; i < state.seal.path.length; i++) {
            const a = state.seal.path[i - 1];
            const b = state.seal.path[i];
            const d = distancePointToSegment(enemy.x, enemy.y, a.x, a.y, b.x, b.y);
            if (d < enemy.r + 8) {
              enemy.pulse = 1;
              breakSealLine(enemy.x, enemy.y);
              break;
            }
          }
        }
      }
    }

    function updateSealDrawing(dt) {
      const seal = state.seal;
      const x = state.pointer.x;
      const y = state.pointer.y;
      const inside = isInsideSealLake(x, y);
      const nearBoundary = distanceToLakeBoundary(x, y) < 28;

      if (!seal.drawing) {
        if (inside && nearBoundary) {
          seal.drawing = true;
          seal.path = [{ x, y, life: 1 }];
          seal.safePulse = 1;
        }
        return;
      }

      const last = seal.path[seal.path.length - 1];
      if (!last || Math.hypot(x - last.x, y - last.y) > 7) {
        seal.path.push({ x, y, life: 1 });
      }
      if (seal.path.length > 150) seal.path.shift();

      if (!inside || (nearBoundary && seal.path.length > 18)) {
        completeSealPath();
      }
    }

    function completeSealPath() {
      const seal = state.seal;
      if (!seal.drawing || seal.path.length < 10) {
        seal.drawing = false;
        seal.path = [];
        return;
      }
      let length = 0;
      let maxDepth = 0;
      const lake = seal.lake;
      for (let i = 1; i < seal.path.length; i++) {
        const a = seal.path[i - 1];
        const b = seal.path[i];
        length += Math.hypot(b.x - a.x, b.y - a.y);
        const dx = (b.x - lake.x) / lake.rx;
        const dy = (b.y - lake.y) / lake.ry;
        maxDepth = Math.max(maxDepth, 1 - Math.sqrt(dx * dx + dy * dy));
      }
      const baseGain = clamp(length / 52 + maxDepth * 9, 3, 15);
      const chainBonus = Math.min(1.35, 1 + seal.chain * 0.08);
      const gain = clamp(baseGain * chainBonus, 3, 19);
      const grade = gain >= 14 ? "大封印" : gain >= 8 ? "稳定封印" : "小封印";
      seal.progress = clamp(seal.progress + gain, 0, seal.targetProgress);
      seal.lastGain = gain;
      seal.lastGrade = `${grade} +${Math.round(gain)}%`;
      seal.gradePulse = 1;
      seal.safePulse = 1;
      seal.chain += 1;
      createSealPatch(seal.path, gain, maxDepth);
      state.score += Math.round(gain);
      state.combo += 1;
      state.comboTimer = 2.6;
      state.bestCombo = Math.max(state.bestCombo, state.combo);
      scoreEl.textContent = state.score;
      comboEl.textContent = state.combo;
      addParticles(seal.path[seal.path.length - 1].x, seal.path[seal.path.length - 1].y, 48, true);
      seal.drawing = false;
      seal.path = [];
    }

    function createSealPatch(path, gain, maxDepth) {
      if (!path || path.length < 3) return;
      const lake = state.seal.lake;
      const centroid = path.reduce((acc, point) => {
        acc.x += point.x;
        acc.y += point.y;
        return acc;
      }, { x: 0, y: 0 });
      centroid.x /= path.length;
      centroid.y /= path.length;

      state.seal.patches.push({
        x: clamp(centroid.x, lake.x - lake.rx * 0.86, lake.x + lake.rx * 0.86),
        y: clamp(centroid.y, lake.y - lake.ry * 0.78, lake.y + lake.ry * 0.78),
        rx: clamp(gain * 6.2, 26, lake.rx * 0.22),
        ry: clamp((gain * 3.6) + maxDepth * 28, 16, lake.ry * 0.22),
        angle: rand(-0.45, 0.45),
        life: 0
      });
      if (state.seal.patches.length > 12) state.seal.patches.shift();
    }

    function breakSealLine(x, y) {
      const seal = state.seal;
      seal.breakPulse = 1;
      seal.gradePulse = 0;
      seal.lastGrade = "";
      seal.chain = 0;
      seal.drawing = false;
      seal.path = [];
      state.core = clamp(state.core - 12, 0, state.coreTarget);
      state.combo = 0;
      state.comboTimer = 0;
      comboEl.textContent = state.combo;
      updateCoreHud();
      addParticles(x, y, 34, false);
      if (state.core <= 0) {
        window.setTimeout(() => {
          if (state.running && state.core <= 0) endGame(false);
        }, 260);
      }
    }

    function setupRefractionLevel() {
      const w = state.width;
      const h = state.height;
      const scale = clamp(w / 1200, 0.78, 1.16);
      state.refraction.source = { x: w * 0.24, y: h * 0.58 };
      state.refraction.prisms = [
        { x: w * 0.43, y: h * 0.68, r: 32 * scale, lit: 0, pulse: 0, index: 0 },
        { x: w * 0.60, y: h * 0.56, r: 34 * scale, lit: 0, pulse: 0, index: 1 },
        { x: w * 0.70, y: h * 0.76, r: 36 * scale, lit: 0, pulse: 0, index: 2 }
      ];
      const core = getCorePoint();
      state.refraction.target = { x: core.x, y: core.y + 18, r: 48 * scale };
      state.refraction.current = 0;
      state.refraction.charge = 0;
      state.refraction.chargeTarget = 1.55;
      state.refraction.active = false;
      state.refraction.perfect = 0;
      state.refraction.shimmer = 0;
      state.refraction.completedSegments = [];
      state.core = 0;
      state.timeLeft = 75;
      updateCoreHud();
      updateLevelHint();
    }

    function getRefractionAnchor() {
      if (state.refraction.current === 0) return state.refraction.source;
      return state.refraction.prisms[state.refraction.current - 1] || state.refraction.source;
    }

    function getCurrentPrism() {
      return state.refraction.prisms[state.refraction.current] || null;
    }

    function completeRefractionSegment(prism, alignment) {
      const anchor = getRefractionAnchor();
      prism.lit = 1;
      prism.pulse = 1;
      state.refraction.completedSegments.push({
        from: { x: anchor.x, y: anchor.y },
        to: { x: prism.x, y: prism.y },
        strength: alignment
      });
      state.refraction.current += 1;
      state.refraction.charge = 0;
      state.refraction.perfect = Math.max(state.refraction.perfect, alignment);
      state.score += alignment > 0.82 ? 6 : alignment > 0.62 ? 4 : 3;
      state.combo += 1;
      state.comboTimer = 2.8;
      state.bestCombo = Math.max(state.bestCombo, state.combo);
      scoreEl.textContent = state.score;
      comboEl.textContent = state.combo;
      addParticles(prism.x, prism.y, alignment > 0.82 ? 76 : 54, true);

      const progress = state.refraction.current / state.refraction.prisms.length;
      state.core = clamp(progress * state.coreTarget * 0.82, 0, state.coreTarget);
      updateCoreHud();

      if (state.refraction.current >= state.refraction.prisms.length) {
        const target = state.refraction.target;
        const last = prism;
        state.refraction.completedSegments.push({
          from: { x: last.x, y: last.y },
          to: { x: target.x, y: target.y },
          strength: 1,
          final: true
        });
        state.core = state.coreTarget;
        updateCoreHud();
        addParticles(target.x, target.y, 95, true);
        window.setTimeout(() => {
          if (state.running) triggerLevelComplete();
        }, 520);
      }
    }

    function updateRefraction(dt) {
      if (state.level !== 2 || state.levelComplete) return;
      const ref = state.refraction;
      ref.shimmer += dt;
      for (const prism of ref.prisms) {
        prism.pulse = Math.max(0, prism.pulse - dt * 2.2);
      }

      const prism = getCurrentPrism();
      if (!prism) return;
      const anchor = getRefractionAnchor();

      const distToPrism = distancePointToSegment(
        prism.x,
        prism.y,
        anchor.x,
        anchor.y,
        state.pointer.x,
        state.pointer.y
      );
      const pointerToPrism = Math.hypot(state.pointer.x - prism.x, state.pointer.y - prism.y);
      const alignment = clamp(1 - distToPrism / 78, 0, 1);
      const closeEnough = pointerToPrism < prism.r + 138;
      ref.active = alignment > 0.42 && closeEnough;
      prism.lit += ((ref.active ? alignment : 0) - prism.lit) * 0.16;

      if (ref.active) {
        ref.charge = clamp(ref.charge + dt * (0.55 + alignment * 1.05), 0, ref.chargeTarget);
        ref.perfect = Math.max(ref.perfect, alignment);
        prism.pulse = Math.max(prism.pulse, alignment);
        state.pointer.aura = Math.max(state.pointer.aura, alignment * 0.7);
      } else {
        ref.charge = Math.max(0, ref.charge - dt * 0.42);
      }

      const partialProgress = ref.current / ref.prisms.length + (ref.charge / ref.chargeTarget) / ref.prisms.length;
      state.core = clamp(partialProgress * state.coreTarget * 0.82, 0, state.coreTarget);
      updateCoreHud();

      if (ref.charge >= ref.chargeTarget) {
        completeRefractionSegment(prism, alignment);
      }
    }

    function createConstellation() {
      const points = [
        [0.30, 0.73],
        [0.43, 0.58],
        [0.58, 0.67],
        [0.72, 0.54],
        [0.63, 0.79],
        [0.46, 0.83]
      ];

      const nodeTypes = ["anchor", "hold", "rhythm", "quick", "hold", "final"];
      state.constellation.nodes = points.map(([x, y], index) => ({
        x: x * state.width,
        y: y * state.height,
        index,
        type: nodeTypes[index] || "normal",
        lit: index === 0,
        pulse: Math.random() * TAU,
        touchPulse: index === 0 ? 1 : 0
      }));
      state.constellation.current = 1;
      state.constellation.beamStability = 1;
      state.constellation.beamCharge = 0;
      state.constellation.breakPulse = 0;
      state.constellation.skyReveal = 0;
      state.constellation.deviationTime = 0;
      state.constellation.rifts = createConstellationRifts();
      state.constellation.resonance = 0;
      state.constellation.resonanceMax = 0;
      state.constellation.segmentGrades = [];
      state.constellation.lastGradeText = "";
      state.constellation.lastGradePulse = 0;
      state.constellation.segmentTimer = 0;
      state.constellation.quickBonus = 0;
      state.constellation.rhythmBonus = 0;
      state.constellation.mistakes = 0;
      state.constellation.graceTimer = 1.45;
      state.core = state.coreTarget;
    }

    function createConstellationRifts() {
      const scale = clamp(state.width / 1200, 0.78, 1.14);
      const seeds = [
        [0.50, 0.64, 26, 0.18, 18, 8],
        [0.63, 0.67, 28, 0.22, 16, 10]
      ];
      return seeds.map(([x, y, r, speed, driftX, driftY], index) => ({
        x: x * state.width,
        y: y * state.height,
        ox: x * state.width,
        oy: y * state.height,
        r: r * scale,
        speed,
        driftX,
        driftY,
        phase: index * 2.1 + Math.random() * TAU,
        pulse: 0
      }));
    }

    function updateConstellationRifts(dt) {
      if (state.level !== 2) return;
      for (const rift of state.constellation.rifts) {
        rift.phase += dt * rift.speed;
        rift.x = rift.ox + Math.sin(rift.phase * 1.15) * rift.driftX + Math.cos(rift.phase * 0.7) * rift.driftX * 0.35;
        rift.y = rift.oy + Math.cos(rift.phase * 0.92) * rift.driftY;
        rift.pulse = Math.max(0, rift.pulse - dt * 2.4);
      }
    }

    function updateConstellation(dt) {
      if (state.level !== 2 || state.constellation.completed) return;

      updateConstellationRifts(dt);

      state.constellation.wrongPulse = Math.max(0, state.constellation.wrongPulse - dt * 2.6);
      state.constellation.completePulse = Math.max(0, state.constellation.completePulse - dt * 0.9);
      state.constellation.lastGradePulse = Math.max(0, state.constellation.lastGradePulse - dt * 1.4);

      for (const node of state.constellation.nodes) {
        node.pulse += dt * 2.2;
        node.touchPulse = Math.max(0, node.touchPulse - dt * 2.8);
      }

      const currentNode = state.constellation.nodes[state.constellation.current];
      const anchorNode = state.constellation.nodes[state.constellation.current - 1];
      if (!currentNode || !anchorNode) return;
      state.constellation.segmentTimer += dt;
      state.constellation.graceTimer = Math.max(0, state.constellation.graceTimer - dt);

      state.constellation.breakPulse = Math.max(0, state.constellation.breakPulse - dt * 2.2);
      state.constellation.skyReveal = Math.max(state.constellation.skyReveal, state.constellation.completed ? Math.min(1, state.constellation.skyReveal + dt * 0.85) : state.constellation.skyReveal);

      const distToSegment = distancePointToSegment(
        state.pointer.x,
        state.pointer.y,
        anchorNode.x,
        anchorNode.y,
        currentNode.x,
        currentNode.y
      );
      const corridor = 74;
      const targetStability = clamp(1 - distToSegment / corridor, 0, 1);
      state.constellation.beamStability += (targetStability - state.constellation.beamStability) * 0.18;

      if (state.constellation.graceTimer > 0) {
        state.constellation.deviationTime = 0;
      } else if (targetStability < 0.18) {
        state.constellation.deviationTime += dt;
      } else {
        state.constellation.deviationTime = Math.max(0, state.constellation.deviationTime - dt * 2.8);
      }

      if (state.constellation.graceTimer <= 0 && state.constellation.deviationTime > 0.28 && state.damageCooldown <= 0) {
        breakConstellationBeam("deviation");
      }

      const beamBlocked = false;

      const dist = Math.hypot(currentNode.x - state.pointer.x, currentNode.y - state.pointer.y);
      const targetRadius = currentNode.type === "quick" ? 34 : 38;
      const chargeTarget = getNodeChargeTarget(currentNode);
      const rhythm = getRhythmWindow(currentNode);
      if (dist < targetRadius && state.constellation.beamStability > 0.36) {
        const rhythmBoost = currentNode.type === "rhythm" ? 0.72 + rhythm * 0.92 : 1;
        state.constellation.beamCharge += dt * rhythmBoost;
        state.constellation.resonance += dt * state.constellation.beamStability * 1.35;
        state.constellation.resonanceMax += dt * 1.35;
        if (currentNode.type === "rhythm" && rhythm > 0.74) state.constellation.rhythmBonus = Math.max(state.constellation.rhythmBonus, rhythm);
        if (currentNode.type === "quick" && state.constellation.segmentTimer <= 3.2) state.constellation.quickBonus = 1;
        currentNode.touchPulse = Math.max(currentNode.touchPulse, (state.constellation.beamCharge / chargeTarget) * 2.2);
        if (state.constellation.beamCharge >= chargeTarget) {
          lightConstellationNode(currentNode);
        }
      } else {
        state.constellation.beamCharge = Math.max(0, state.constellation.beamCharge - dt * 2.8);
      }
