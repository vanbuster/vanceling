      if (state.constellation.beamStability < 0.18 && state.damageCooldown <= 0) {
        state.constellation.wrongPulse = Math.max(state.constellation.wrongPulse, 0.35);
      }
    }

    function getNodeChargeTarget(node) {
      if (!node) return 0.28;
      if (node.type === "hold") return 0.62;
      if (node.type === "final") return 0.46;
      return 0.28;
    }

    function getRhythmWindow(node) {
      if (!node || node.type !== "rhythm") return 0;
      return (Math.sin(node.pulse * 2.2) + 1) / 2;
    }

    function getNodeTypeLabel(node) {
      if (!node) return "准备连接";
      if (node.type === "hold") return "长按稳定";
      if (node.type === "rhythm") return "节奏星点";
      if (node.type === "quick") return "快速连接";
      if (node.type === "final") return "终点回响";
      return "普通连接";
    }

    function getSegmentGrade() {
      const ratio = state.constellation.resonanceMax > 0
        ? clamp(state.constellation.resonance / state.constellation.resonanceMax, 0, 1)
        : state.constellation.beamStability;
      let bonus = 0;
      let bonusLabel = "";
      if (state.constellation.quickBonus > 0) {
        bonus += 0.22;
        bonusLabel = "疾光";
      }
      if (state.constellation.rhythmBonus > 0.74) {
        bonus += 0.18;
        bonusLabel = bonusLabel ? `${bonusLabel}·准拍` : "准拍";
      }
      const adjusted = clamp(ratio + bonus, 0, 1);
      if (adjusted >= 0.88) return { label: bonusLabel ? `完美共鸣 ${bonusLabel}` : "完美共鸣", score: 3, ratio: adjusted };
      if (adjusted >= 0.68) return { label: bonusLabel ? `稳定共鸣 ${bonusLabel}` : "稳定共鸣", score: 2, ratio: adjusted };
      return { label: "微弱共鸣", score: 1, ratio: adjusted };
    }

    function isLiveBeamBlocked(anchorNode, px, py) {
      return false;
    }

    function breakConstellationBeam(reason = "deviation") {
      state.damageCooldown = 0.72;
      state.constellation.wrongPulse = 1;
      state.constellation.breakPulse = 1;
      state.constellation.beamCharge = 0;
      state.constellation.beamStability = reason === "rift" ? 0.18 : 0.34;
      state.constellation.deviationTime = 0;
      state.constellation.resonance = 0;
      state.constellation.resonanceMax = 0;
      state.constellation.quickBonus = 0;
      state.constellation.rhythmBonus = 0;
      if (state.constellation.graceTimer > 0) return;
      state.constellation.mistakes += 1;
      state.combo = 0;
      state.comboTimer = 0;
      state.pointer.aura = 0.25;
      state.core = clamp(state.core - 9, 0, state.coreTarget);
      comboEl.textContent = state.combo;
      updateCoreHud();
      updateLevelHint();
      addParticles(state.pointer.x, state.pointer.y, reason === "rift" ? 26 : 22, false);
      playDamageSound();

      if (state.core <= 0 || state.constellation.mistakes >= state.constellation.maxMistakes) {
        window.setTimeout(() => {
          if (state.running && state.level === 2) endGame(false);
        }, 260);
      }
    }

    function lightConstellationNode(node) {
      const grade = getSegmentGrade();
      state.constellation.segmentGrades.push(grade);
      state.constellation.lastGradeText = grade.label;
      state.constellation.lastGradePulse = 1;
      state.constellation.resonance = 0;
      state.constellation.resonanceMax = 0;

      node.lit = true;
      node.touchPulse = 1;
      state.constellation.current += 1;
      state.constellation.beamCharge = 0;
      state.constellation.beamStability = 1;
      state.constellation.deviationTime = 0;
      state.constellation.segmentTimer = 0;
      state.constellation.quickBonus = 0;
      state.constellation.rhythmBonus = 0;
      state.constellation.graceTimer = 0.85;
      state.constellation.breakPulse = 0;
      state.score += 2 + grade.score;
      playConnectionTone(state.constellation.current, grade.score);
      state.combo += 1;
      state.comboTimer = 2.4;
      state.bestCombo = Math.max(state.bestCombo, state.combo);
      const progressCore = (state.constellation.current / state.constellation.nodes.length) * state.coreTarget;
      state.core = clamp(Math.max(state.core, progressCore), 0, state.coreTarget);
      state.corePulse = 1;
      state.pointer.aura = 1;
      scoreEl.textContent = state.score;
      comboEl.textContent = state.combo;
      updateCoreHud();
      updateLevelHint();
      addParticles(node.x, node.y, grade.score === 3 ? 68 : grade.score === 2 ? 52 : 38, true);

      if (state.constellation.current >= state.constellation.nodes.length) {
        state.constellation.completed = true;
        state.constellation.completePulse = 1;
        state.constellation.skyReveal = 0.01;
        triggerLevelComplete();
      }
    }

    function distancePointToSegment(px, py, ax, ay, bx, by) {
      const abx = bx - ax;
      const aby = by - ay;
      const apx = px - ax;
      const apy = py - ay;
      const abLenSq = abx * abx + aby * aby || 1;
      const t = clamp((apx * abx + apy * aby) / abLenSq, 0, 1);
      const cx = ax + abx * t;
      const cy = ay + aby * t;
      return Math.hypot(px - cx, py - cy);
    }

    function updateFogs(dt) {
      for (const fog of state.fogs) {
        if (fog.purifiedTimer > 0) {
          fog.purifiedTimer -= dt;
          fog.purifyPulse = Math.max(0, fog.purifyPulse - dt * 1.4);
          if (fog.purifiedTimer <= 0) {
            fog.phase = Math.random() * TAU;
            fog.hitPulse = 0;
            fog.purifyPulse = 0;
          }
          continue;
        }

        fog.phase += dt * fog.speed;
        fog.x = fog.ox + Math.sin(fog.phase * 1.15) * fog.driftX + Math.cos(fog.phase * 0.62) * fog.driftX * 0.35;
        fog.y = fog.oy + Math.cos(fog.phase * 0.92) * fog.driftY;
        fog.hitPulse = Math.max(0, fog.hitPulse - dt * 2.2);

        const dist = Math.hypot(fog.x - state.pointer.x, fog.y - state.pointer.y);
        if (dist < fog.r + 24 && state.damageCooldown <= 0 && state.running) {
          takeFogDamage(fog);
        }
      }
    }

    function purifyFog(fog) {
      state.cleanseEnergy = 0;
      state.damageCooldown = 0.55;
      state.pointer.aura = 1.2;
      fog.purifiedTimer = 4.2;
      fog.purifyPulse = 1;
      fog.hitPulse = 0;
      state.core = clamp(state.core + 2, 0, state.coreTarget);
      updateCoreHud();
      updateLevelHint();
      addParticles(fog.x, fog.y, 72, true);
      state.ripples.push({ x: fog.x, y: fog.y, r: 12, life: 1.1, maxLife: 1.1 });
    }

    function takeFogDamage(fog) {
      state.damageCooldown = state.level === 1 ? 1.25 : 1.1;
      state.combo = 0;
      state.comboTimer = 0;
      const fogPenalty = state.level === 1 ? 10 : 3;
      state.core = clamp(state.core - fogPenalty, 0, state.coreTarget);
      if (state.level === 1) {
        state.timeLeft = Math.max(0, state.timeLeft - 2.5);
        timeEl.textContent = Math.ceil(state.timeLeft);
      }
      state.pointer.aura = 0.35;
      fog.hitPulse = 1;
      comboEl.textContent = state.combo;
      updateCoreHud();

      if (state.core <= 0) {
        state.pointer.aura = 0;
        addParticles(state.pointer.x, state.pointer.y, 34, false);
        playDamageSound();
        window.setTimeout(() => {
          if (state.running && state.core <= 0) endGame(false);
        }, 280);
        return;
      }

      addParticles(state.pointer.x, state.pointer.y, state.level === 1 ? 42 : 18, false);
      playDamageSound();

      const dx = state.pointer.x - fog.x;
      const dy = state.pointer.y - fog.y;
      const len = Math.hypot(dx, dy) || 1;
      const knockback = state.level === 1 ? 138 : 70;
      state.pointer.tx = clamp(state.pointer.tx + (dx / len) * knockback, 0, state.width);
      state.pointer.ty = clamp(state.pointer.ty + (dy / len) * knockback, 0, state.height);
    }

    function collectStar(index, star) {
      state.stars.splice(index, 1);
      const value = star.kind === "gold" ? 2 : 1;
      state.score += value;
      state.combo += 1;
      state.comboTimer = 2.15;
      state.bestCombo = Math.max(state.bestCombo, state.combo);
      state.core = clamp(state.core + value + Math.floor(state.combo / 5) * 0.5, 0, state.coreTarget);
      state.corePulse = 1;
      state.pointer.aura = 1;

      scoreEl.textContent = state.score;
      comboEl.textContent = state.combo;
      updateCoreHud();

      addParticles(star.x, star.y, star.kind === "gold" ? 42 : 30, star.kind === "gold");
      playCollectSound(star.kind);
      wakeNearestFlower(star.x, star.y);

      if (state.core >= state.coreTarget) {
        triggerLevelComplete();
      }
    }

    function wakeNearestFlower(x, y) {
      let nearest = null;
      let best = Infinity;
      for (const flower of state.flowers) {
        const d = Math.hypot(flower.x - x, flower.y - y);
        if (d < best) {
          best = d;
          nearest = flower;
        }
      }
      if (nearest) nearest.bloom = Math.min(1.45, nearest.bloom + 0.34);
    }

    function drawRoundedRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawBackground(time) {
      const w = state.width;
      const h = state.height;

      const sky = ctx.createLinearGradient(0, 0, 0, h);
      sky.addColorStop(0, "#030719");
      sky.addColorStop(0.25, "#0d1a4a");
      sky.addColorStop(0.56, "#4d48a6");
      sky.addColorStop(1, "#050719");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, w, h);

      const glow = ctx.createRadialGradient(w * 0.62, h * 0.18, 0, w * 0.62, h * 0.18, Math.max(w, h) * 0.72);
      glow.addColorStop(0, "rgba(191, 247, 255, 0.18)");
      glow.addColorStop(0.32, "rgba(200, 184, 255, 0.10)");
      glow.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, w, h);

      drawSkyRibbon(time);
      drawMoon(w * 0.28, h * 0.13, Math.min(w, h) * 0.14);

      for (const s of state.backgroundStars) {
        const a = s.alpha * (0.56 + Math.sin(time * 0.0015 + s.pulse) * 0.34);
        ctx.beginPath();
        ctx.fillStyle = `rgba(226, 238, 255, ${a})`;
        ctx.arc(s.x, s.y, s.r, 0, TAU);
        ctx.fill();
      }

      drawClouds(time);
      drawDistantIslands(time);
      drawTemple(time);
      drawGardenPlatforms(time);
      drawWaterAndMist(time);
      drawAmbientDust(time);
      drawFireflies();
    }

    function getCorePoint() {
      return {
        x: state.width * 0.5,
        y: state.height * 0.55 - 120 * clamp(state.width / 1280, 0.72, 1.18)
      };
    }

    function drawSkyRibbon(time) {
      const w = state.width;
      const h = state.height;
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.globalAlpha = 0.46;
      for (let layer = 0; layer < 3; layer++) {
        const baseY = h * (0.18 + layer * 0.07);
        const amp = 18 + layer * 8;
        const grad = ctx.createLinearGradient(0, baseY - 60, 0, baseY + 80);
        grad.addColorStop(0, "rgba(255,255,255,0)");
        grad.addColorStop(0.35, layer === 1 ? "rgba(180, 255, 245, 0.10)" : "rgba(188, 218, 255, 0.08)");
        grad.addColorStop(0.72, layer === 2 ? "rgba(255, 220, 210, 0.07)" : "rgba(216, 192, 255, 0.08)");
        grad.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(-40, baseY + amp * 2.4);
        for (let x = -40; x <= w + 40; x += 50) {
          const y = baseY + Math.sin(x * 0.012 + time * 0.00018 + layer * 1.4) * amp + Math.cos(x * 0.005 + time * 0.00009 + layer) * (amp * 0.4);
          ctx.quadraticCurveTo(x + 25, y - amp * 0.9, x + 50, y);
        }
        ctx.lineTo(w + 40, baseY + amp * 3.6);
        ctx.lineTo(-40, baseY + amp * 3.6);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }

    function drawMoon(x, y, r) {
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      const g = ctx.createRadialGradient(x, y, r * 0.15, x, y, r * 1.5);
      g.addColorStop(0, "rgba(220, 237, 255, 0.38)");
      g.addColorStop(0.28, "rgba(178, 204, 255, 0.16)");
      g.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(x, y, r * 1.55, 0, TAU);
      ctx.fill();
      ctx.strokeStyle = "rgba(220, 235, 255, 0.58)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(x, y, r, -1.8, 1.2);
      ctx.stroke();
      ctx.restore();
    }

    function drawClouds(time) {
      const w = state.width;
      const h = state.height;
      ctx.save();
      ctx.globalAlpha = 0.25;
      for (let layer = 0; layer < 3; layer++) {
        const y = h * (0.34 + layer * 0.055);
        const speed = time * 0.004 * (layer + 1);
        const g = ctx.createLinearGradient(0, y - 40, 0, y + 80);
        g.addColorStop(0, "rgba(255,255,255,0)");
        g.addColorStop(0.5, `rgba(${180 + layer * 20}, ${190 + layer * 16}, 255, ${0.17 - layer * 0.025})`);
        g.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.moveTo(0, y + 70);
        for (let x = -80; x <= w + 80; x += 60) {
          const wave = Math.sin((x + speed) * 0.012 + layer) * 22 + Math.cos(x * 0.021) * 9;
          ctx.quadraticCurveTo(x + 30, y + wave, x + 60, y + 48 + wave * 0.3);
        }
        ctx.lineTo(w, y + 120);
        ctx.lineTo(0, y + 120);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }

    function drawDistantIslands(time) {
      const w = state.width;
      const h = state.height;
      ctx.save();
      for (const island of state.islands) {
        const x = island.x * w;
        const y = island.y * h + Math.sin(time * 0.0007 + island.x * 10) * 5;
        const s = island.s * clamp(w / 1200, 0.8, 1.15);
        ctx.globalAlpha = island.a;
        ctx.fillStyle = "rgba(31, 43, 88, 0.88)";
        ctx.beginPath();
        ctx.ellipse(x, y, 86 * s, 22 * s, 0, 0, TAU);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(x - 70 * s, y + 10 * s);
        ctx.lineTo(x - 20 * s, y + 92 * s);
        ctx.lineTo(x + 20 * s, y + 92 * s);
        ctx.lineTo(x + 70 * s, y + 10 * s);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = "rgba(220, 230, 255, 0.45)";
        ctx.lineWidth = 1.2;
        ctx.strokeRect(x - 28 * s, y - 62 * s, 56 * s, 72 * s);
        drawArch(x, y - 38 * s, 38 * s, 74 * s, s, "rgba(220, 230, 255, 0.38)");
      }
      ctx.restore();
    }

    function drawTemple(time) {
      const w = state.width;
      const h = state.height;
      const cx = w * 0.5;
      const baseY = h * 0.55;
      const scale = clamp(w / 1280, 0.72, 1.18);

      ctx.save();
      ctx.globalAlpha = 0.9;
      drawBridge(w * 0.25, baseY + 26 * scale, w * 0.75, baseY + 26 * scale, scale);
      drawTempleGlow(cx, baseY - 30 * scale, 410 * scale, 180 * scale);

      drawArch(cx - 185 * scale, baseY - 42 * scale, 92 * scale, 190 * scale, scale, "rgba(235, 224, 255, 0.56)");
      drawArch(cx, baseY - 76 * scale, 108 * scale, 238 * scale, scale, "rgba(255, 232, 184, 0.54)");
      drawArch(cx + 178 * scale, baseY - 34 * scale, 106 * scale, 180 * scale, scale, "rgba(198, 241, 255, 0.54)");
      drawGlassDome(cx + 300 * scale, baseY - 18 * scale, 85 * scale, 132 * scale, time);

      drawHangingLantern(cx - 76 * scale, baseY - 72 * scale, 11 * scale, time + 200);
      drawHangingLantern(cx + 76 * scale, baseY - 72 * scale, 11 * scale, time + 500);
      drawHangingLantern(cx - 185 * scale, baseY - 20 * scale, 8 * scale, time + 800);
      drawHangingLantern(cx + 178 * scale, baseY - 16 * scale, 8 * scale, time + 1100);

      drawCoreAltar(cx, baseY - 120 * scale, 42 * scale, time);
      drawPortalRing(cx, baseY - 126 * scale, 34 * scale, time);
      drawPortalRing(cx - 185 * scale, baseY - 84 * scale, 22 * scale, time + 900);
      drawPortalRing(cx + 178 * scale, baseY - 82 * scale, 25 * scale, time + 1800);

      ctx.restore();
    }

    function drawTempleGlow(x, y, width, height) {
      ctx.save();
      const g = ctx.createRadialGradient(x, y, 0, x, y, width * 0.6);
      g.addColorStop(0, "rgba(255, 236, 192, 0.10)");
      g.addColorStop(0.42, "rgba(198, 216, 255, 0.08)");
      g.addColorStop(1, "rgba(198, 216, 255, 0)");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.ellipse(x, y, width, height, 0, 0, TAU);
      ctx.fill();
      ctx.restore();
    }

    function drawHangingLantern(x, y, r, time) {
      ctx.save();
      const swing = Math.sin(time * 0.0014) * 0.08;
      ctx.translate(x, y);
      ctx.rotate(swing);
      ctx.strokeStyle = "rgba(255,255,255,0.28)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, -20 - r * 1.8);
      ctx.lineTo(0, -3);
      ctx.stroke();
      const g = ctx.createRadialGradient(0, 1, 0, 0, 1, r * 4.2);
      g.addColorStop(0, "rgba(255, 244, 214, 0.72)");
      g.addColorStop(0.45, "rgba(255, 216, 162, 0.30)");
      g.addColorStop(1, "rgba(255, 216, 162, 0)");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(0, 1, r * 4.2, 0, TAU);
      ctx.fill();
      ctx.fillStyle = "rgba(255, 244, 214, 0.86)";
      ctx.strokeStyle = "rgba(255,255,255,0.50)";
      ctx.lineWidth = 1.1;
      ctx.beginPath();
      ctx.roundRect(-r, -r * 1.1, r * 2, r * 2.4, r * 0.8);
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    function drawArch(x, y, width, height, scale, color) {
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = Math.max(2, 3 * scale);
      ctx.shadowBlur = 18 * scale;
      ctx.shadowColor = color;
      ctx.beginPath();
      ctx.moveTo(x - width / 2, y + height / 2);
      ctx.lineTo(x - width / 2, y - height * 0.12);
      ctx.quadraticCurveTo(x - width / 2, y - height / 2, x, y - height / 2);
      ctx.quadraticCurveTo(x + width / 2, y - height / 2, x + width / 2, y - height * 0.12);
      ctx.lineTo(x + width / 2, y + height / 2);
      ctx.stroke();
      ctx.strokeStyle = "rgba(255,255,255,0.16)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x - width * 0.34, y + height / 2);
      ctx.lineTo(x - width * 0.34, y - height * 0.06);
      ctx.quadraticCurveTo(x - width * 0.34, y - height * 0.34, x, y - height * 0.34);
      ctx.quadraticCurveTo(x + width * 0.34, y - height * 0.34, x + width * 0.34, y - height * 0.06);
      ctx.lineTo(x + width * 0.34, y + height / 2);
      ctx.stroke();
      ctx.restore();
    }

    function drawGlassDome(x, y, width, height, time) {
      ctx.save();
      const g = ctx.createLinearGradient(x - width / 2, y - height / 2, x + width / 2, y + height / 2);
      g.addColorStop(0, "rgba(202, 242, 255, 0.06)");
      g.addColorStop(0.5, "rgba(255, 255, 255, 0.12)");
      g.addColorStop(1, "rgba(201, 183, 255, 0.05)");
      ctx.fillStyle = g;
      ctx.strokeStyle = "rgba(218, 239, 255, 0.42)";
      ctx.lineWidth = 2;
      ctx.shadowBlur = 22;
      ctx.shadowColor = "rgba(184, 225, 255, 0.28)";
      ctx.beginPath();
      ctx.moveTo(x - width / 2, y + height / 2);
      ctx.lineTo(x - width / 2, y - height * 0.05);
      ctx.quadraticCurveTo(x - width / 2, y - height / 2, x, y - height / 2);
      ctx.quadraticCurveTo(x + width / 2, y - height / 2, x + width / 2, y - height * 0.05);
      ctx.lineTo(x + width / 2, y + height / 2);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      for (let i = -1; i <= 1; i++) {
        ctx.beginPath();
        ctx.moveTo(x + i * width * 0.18, y + height / 2);
        ctx.quadraticCurveTo(x + i * width * 0.11, y - height * 0.24, x, y - height / 2);
        ctx.stroke();
      }
      drawPortalRing(x, y - height * 0.12, 20 + Math.sin(time * 0.002) * 2, time);
      ctx.restore();
    }

    function drawCoreAltar(x, y, r, time) {
      ctx.save();
      const progress = clamp(state.core / state.coreTarget, 0, 1);
      const burst = state.completionBurst || 0;
      const pulse = 1 + state.corePulse * 0.35 + burst * 0.55 + Math.sin(time * 0.003) * 0.04;
      ctx.translate(x, y);
      ctx.globalCompositeOperation = "lighter";
      const aura = ctx.createRadialGradient(0, 0, 0, 0, 0, r * (2.8 + progress * 1.4) * pulse);
      aura.addColorStop(0, `rgba(255, 246, 210, ${0.18 + progress * 0.34 + burst * 0.26})`);
      aura.addColorStop(0.36, `rgba(202, 178, 255, ${0.14 + progress * 0.25 + burst * 0.18})`);
      aura.addColorStop(1, "rgba(202, 178, 255, 0)");
      ctx.fillStyle = aura;
      ctx.beginPath();
      ctx.arc(0, 0, r * (2.8 + progress * 1.4) * pulse, 0, TAU);
      ctx.fill();

      ctx.rotate(Math.sin(time * 0.001) * 0.04);
      for (let i = 0; i < 7; i++) {
        ctx.save();
        ctx.rotate((TAU * i) / 7);
        const petal = ctx.createLinearGradient(0, -r * 1.2, 0, 0);
        petal.addColorStop(0, `rgba(255,255,255,${0.2 + progress * 0.62})`);
        petal.addColorStop(1, `rgba(190,165,255,${0.1 + progress * 0.25})`);
        ctx.fillStyle = petal;
        ctx.shadowBlur = 28 + progress * 42;
        ctx.shadowColor = "rgba(221, 207, 255, 0.82)";
        ctx.beginPath();
        ctx.ellipse(0, -r * 0.45, r * 0.16, r * (0.55 + progress * 0.2), 0, 0, TAU);
        ctx.fill();
        ctx.restore();
      }
      ctx.fillStyle = `rgba(255, 236, 174, ${0.28 + progress * 0.62 + burst * 0.24})`; 
      ctx.beginPath();
      ctx.arc(0, 0, r * (0.22 + progress * 0.16), 0, TAU);
      ctx.fill();
      ctx.restore();
    }

    function drawPortalRing(x, y, r, time) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(time * 0.0007);
      ctx.strokeStyle = "rgba(255, 231, 176, 0.72)";
      ctx.lineWidth = 2;
      ctx.shadowBlur = 18;
      ctx.shadowColor = "rgba(255, 221, 160, 0.52)";
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, TAU);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(0, 0, r * 0.46, 0, TAU);
      ctx.stroke();
      ctx.restore();
    }

    function drawBridge(x1, y1, x2, y2, scale) {
      ctx.save();
      const g = ctx.createLinearGradient(x1, y1, x2, y2);
      g.addColorStop(0, "rgba(208, 232, 255, 0.18)");
      g.addColorStop(0.5, "rgba(255, 236, 190, 0.20)");
      g.addColorStop(1, "rgba(208, 232, 255, 0.18)");
      ctx.strokeStyle = g;
      ctx.lineWidth = 8 * scale;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
      ctx.strokeStyle = "rgba(255,255,255,0.16)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x1, y1 - 7 * scale);
      ctx.lineTo(x2, y2 - 7 * scale);
      ctx.stroke();
      for (let i = 0; i <= 8; i++) {
        const t = i / 8;
        const x = x1 + (x2 - x1) * t;
        ctx.strokeStyle = "rgba(255,255,255,0.10)";
        ctx.beginPath();
        ctx.moveTo(x, y1 - 6 * scale);
        ctx.lineTo(x, y1 + 5 * scale);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawGardenPlatforms() {
      const w = state.width;
      const h = state.height;
      const cx = w * 0.5;
      const scale = clamp(w / 1280, 0.75, 1.2);

      drawPlatform(cx, h * 0.74, w * 0.54, h * 0.135, scale, "main");
      drawPlatform(cx, h * 0.61, w * 0.42, h * 0.095, scale, "mid");
      drawPlatform(cx - w * 0.28, h * 0.68, w * 0.29, h * 0.12, scale, "side");
      drawPlatform(cx + w * 0.29, h * 0.68, w * 0.30, h * 0.12, scale, "side");
      drawPlatform(cx - w * 0.37, h * 0.86, w * 0.25, h * 0.12, scale, "front");
      drawPlatform(cx + w * 0.37, h * 0.86, w * 0.25, h * 0.12, scale, "front");

      drawStairs(cx, h * 0.66, w * 0.26, h * 0.17, scale);
    }

    function drawPlatform(x, y, width, height, scale, type) {
      ctx.save();
      const lift = type === "main" ? 1 : type === "mid" ? 0.92 : 0.84;
      const outerGlow = ctx.createRadialGradient(x, y - height * 0.14, 0, x, y, width * 0.68);
      outerGlow.addColorStop(0, `rgba(220, 236, 255, ${0.10 * lift})`);
      outerGlow.addColorStop(0.54, `rgba(174, 160, 255, ${0.09 * lift})`);
      outerGlow.addColorStop(1, "rgba(174, 160, 255, 0)");
      ctx.fillStyle = outerGlow;
      ctx.beginPath();
      ctx.ellipse(x, y + height * 0.03, width * 0.66, height * 0.76, 0, 0, TAU);
      ctx.fill();

      const top = ctx.createLinearGradient(0, y - height / 2, 0, y + height / 2);
      top.addColorStop(0, "rgba(214, 228, 255, 0.52)");
      top.addColorStop(0.30, "rgba(142, 160, 228, 0.42)");
      top.addColorStop(0.68, "rgba(70, 82, 158, 0.50)");
      top.addColorStop(1, "rgba(21, 28, 72, 0.84)");
      ctx.fillStyle = top;
      ctx.strokeStyle = "rgba(236, 243, 255, 0.30)";
      ctx.lineWidth = 1.6;
      ctx.shadowBlur = type === "main" ? 42 : 26;
      ctx.shadowColor = "rgba(140, 178, 255, 0.22)";
      ctx.beginPath();
      ctx.ellipse(x, y, width / 2, height / 2, 0, 0, TAU);
      ctx.fill();
      ctx.stroke();

      const inset = ctx.createLinearGradient(0, y - height * 0.22, 0, y + height * 0.12);
      inset.addColorStop(0, "rgba(255,255,255,0.18)");
      inset.addColorStop(1, "rgba(255,255,255,0)");
      ctx.fillStyle = inset;
      ctx.beginPath();
      ctx.ellipse(x, y - height * 0.14, width * 0.44, height * 0.19, 0, 0, TAU);
      ctx.fill();

      ctx.globalAlpha = 0.34;
      ctx.strokeStyle = "rgba(255,255,255,0.42)";
      ctx.beginPath();
      ctx.ellipse(x, y - height * 0.19, width * 0.42, height * 0.21, 0, 0, TAU);
      ctx.stroke();
      ctx.globalAlpha = 1;

      ctx.strokeStyle = "rgba(197, 178, 255, 0.54)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(x, y - height * 0.02, width * 0.48, height * 0.44, 0, Math.PI, TAU);
      ctx.stroke();

      ctx.strokeStyle = "rgba(255, 243, 214, 0.22)";
      ctx.lineWidth = 1.1;
      ctx.setLineDash([4, 10]);
      ctx.lineDashOffset = -(x + y) * 0.02;
      ctx.beginPath();
      ctx.ellipse(x, y - height * 0.02, width * 0.34, height * 0.24, 0, 0, TAU);
      ctx.stroke();
      ctx.setLineDash([]);

      const latticeCount = type === "main" ? 4 : 3;
      ctx.strokeStyle = "rgba(255,255,255,0.06)";
      ctx.lineWidth = 1;
      for (let i = 0; i < latticeCount; i++) {
        const ratio = (i + 1) / (latticeCount + 1);
        const ex = width * (0.34 + ratio * 0.08);
        ctx.beginPath();
        ctx.ellipse(x, y + height * 0.03, ex, height * (0.24 + ratio * 0.08), 0, Math.PI * 0.08, Math.PI * 0.92);
        ctx.stroke();
      }

      ctx.fillStyle = "rgba(255, 240, 205, 0.32)";
      const runeCount = type === "main" ? 7 : 5;
      for (let i = 0; i < runeCount; i++) {
        const px = x - width * 0.22 + (width * 0.44) * (i / Math.max(1, runeCount - 1));
        const py = y - height * 0.03 + Math.sin(i * 1.6) * 2;
        ctx.beginPath();
        ctx.arc(px, py, type === "main" ? 1.8 : 1.4, 0, TAU);
        ctx.fill();
      }

      const under = ctx.createLinearGradient(0, y + height * 0.04, 0, y + height * 0.68);
      under.addColorStop(0, "rgba(108, 130, 204, 0.18)");
      under.addColorStop(1, "rgba(19, 28, 72, 0)");
      ctx.fillStyle = under;
      ctx.beginPath();
      ctx.ellipse(x, y + height * 0.28, width * 0.42, height * 0.28, 0, 0, TAU);
      ctx.fill();
      ctx.restore();
    }

    function drawStairs(x, y, width, height, scale) {
      ctx.save();
      const steps = 7;
      for (let i = 0; i < steps; i++) {
        const p = i / steps;
        const sw = width * (1 - p * 0.34);
        const sh = height / steps * 0.76;
        const sy = y + i * sh * 0.74;
        ctx.fillStyle = `rgba(${94 + i * 8}, ${110 + i * 7}, ${190 + i * 5}, ${0.34 + i * 0.025})`;
        ctx.strokeStyle = "rgba(230, 240, 255, 0.2)";
        ctx.lineWidth = 1;
        drawRoundedRect(x - sw / 2, sy, sw, sh, 8 * scale);
        ctx.fill();
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawWaterAndMist(time) {
      const w = state.width;
      const h = state.height;
      ctx.save();
      const water = ctx.createLinearGradient(0, h * 0.68, 0, h);
      water.addColorStop(0, "rgba(76, 83, 158, 0.02)");
      water.addColorStop(0.5, "rgba(85, 105, 190, 0.09)");
      water.addColorStop(1, "rgba(116, 169, 255, 0.14)");
      ctx.fillStyle = water;
      ctx.fillRect(0, h * 0.64, w, h * 0.36);

      ctx.globalAlpha = 0.18;
      for (let i = 0; i < 5; i++) {
        const y = h * (0.72 + i * 0.048);
        ctx.strokeStyle = `rgba(204, 237, 255, ${0.16 - i * 0.018})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (let x = -40; x <= w + 40; x += 20) {
          const wave = Math.sin(x * 0.012 + time * 0.0008 + i) * 5 + Math.cos(x * 0.025 + i) * 2;
          if (x === -40) ctx.moveTo(x, y + wave);
          else ctx.lineTo(x, y + wave);
        }
        ctx.stroke();
      }

      const mist = ctx.createLinearGradient(0, h * 0.56, 0, h * 0.88);
      mist.addColorStop(0, "rgba(255,255,255,0)");
      mist.addColorStop(0.5, "rgba(214, 224, 255,0.055)");
      mist.addColorStop(1, "rgba(255,255,255,0)");
      ctx.fillStyle = mist;
      ctx.fillRect(0, h * 0.54, w, h * 0.38);
      ctx.restore();
    }

    function drawAmbientDust(time) {
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      for (const d of state.dustLines) {
        const shimmer = 0.55 + Math.sin(time * 0.0012 + d.phase) * 0.45;
        ctx.save();
        ctx.translate(d.x, d.y);
        ctx.rotate(d.angle);
        const g = ctx.createLinearGradient(-d.len / 2, 0, d.len / 2, 0);
        g.addColorStop(0, "rgba(255,255,255,0)");
        g.addColorStop(0.5, `rgba(222, 232, 255, ${d.alpha * shimmer})`);
        g.addColorStop(1, "rgba(255,255,255,0)");
        ctx.strokeStyle = g;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(-d.len / 2, 0);
        ctx.lineTo(d.len / 2, 0);
        ctx.stroke();
        ctx.restore();
      }
      ctx.restore();
    }

    function drawFireflies() {
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      for (const fly of state.fireflies) {
        const a = 0.35 + Math.sin(fly.phase * 3) * 0.24;
        const g = ctx.createRadialGradient(fly.x, fly.y, 0, fly.x, fly.y, fly.r * 9);
        g.addColorStop(0, `rgba(255, 236, 178, ${a})`);
        g.addColorStop(1, "rgba(255, 236, 178, 0)");
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(fly.x, fly.y, fly.r * 9, 0, TAU);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawFlower(flower) {
      const bloom = flower.bloom;
      const glowBase = flower.baseGlow || 0.5;
      const size = flower.size * (0.66 + glowBase * 0.18 + bloom * 0.78);
      const x = flower.x;
      const y = flower.y;
      const sway = Math.sin(flower.phase * 1.3) * 0.08;

      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(sway);
      ctx.globalCompositeOperation = "lighter";

      const stemGlow = ctx.createLinearGradient(0, size * 0.92, 0, -size * 0.12);
      stemGlow.addColorStop(0, `rgba(122, 210, 182, ${0.10 + bloom * 0.14})`);
      stemGlow.addColorStop(1, `rgba(182, 255, 228, ${0.16 + bloom * 0.22})`);
      ctx.strokeStyle = stemGlow;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(0, size * 0.92);
      ctx.quadraticCurveTo(-size * 0.18, size * 0.34, 0, -size * 0.12);
      ctx.stroke();

      for (const dir of [-1, 1]) {
        const leaf = ctx.createRadialGradient(dir * size * 0.22, size * 0.34, 0, dir * size * 0.22, size * 0.34, size * 0.42);
        leaf.addColorStop(0, `rgba(180, 255, 226, ${0.12 + bloom * 0.10})`);
        leaf.addColorStop(1, "rgba(114, 210, 190, 0)");
        ctx.fillStyle = leaf;
        ctx.beginPath();
        ctx.ellipse(dir * size * 0.22, size * 0.34, size * 0.14, size * 0.28, dir * 0.9, 0, TAU);
        ctx.fill();
      }

      const petals = 10;
      for (let layer = 0; layer < 2; layer++) {
        for (let i = 0; i < petals; i++) {
          const angle = (TAU * i) / petals + layer * (TAU / petals / 2);
          ctx.save();
          ctx.rotate(angle);
          const petalGradient = ctx.createRadialGradient(0, -size * (0.42 + layer * 0.03), 0, 0, -size * (0.44 + layer * 0.03), size * 0.82);
          petalGradient.addColorStop(0, `rgba(255, 252, 255, ${0.18 + glowBase * 0.20 + bloom * 0.50})`);
          petalGradient.addColorStop(0.40, layer === 0
            ? `rgba(244, 225, 255, ${0.12 + glowBase * 0.18 + bloom * 0.26})`
            : `rgba(198, 236, 255, ${0.11 + glowBase * 0.16 + bloom * 0.20})`);
          petalGradient.addColorStop(1, "rgba(166, 216, 255, 0)");
          ctx.fillStyle = petalGradient;
          ctx.shadowBlur = 24 + bloom * 42;
          ctx.shadowColor = layer === 0 ? "rgba(236, 224, 255, 0.60)" : "rgba(204, 229, 255, 0.58)";
          ctx.beginPath();
          ctx.ellipse(0, -size * (0.34 + layer * 0.02), size * (0.14 + layer * 0.02), size * (0.52 + layer * 0.04), 0, 0, TAU);
          ctx.fill();
          ctx.restore();
        }
      }

      const crown = ctx.createRadialGradient(0, -size * 0.1, 0, 0, -size * 0.1, size * 0.64);
      crown.addColorStop(0, `rgba(255,255,255, ${0.12 + bloom * 0.18})`);
      crown.addColorStop(1, "rgba(255,255,255,0)");
      ctx.fillStyle = crown;
      ctx.beginPath();
      ctx.arc(0, -size * 0.08, size * 0.64, 0, TAU);
      ctx.fill();

      const core = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 0.40);
      core.addColorStop(0, `rgba(255, 244, 188, ${0.56 + bloom * 0.46})`);
      core.addColorStop(0.55, `rgba(255, 223, 161, ${0.28 + bloom * 0.18})`);
      core.addColorStop(1, "rgba(255, 239, 173, 0)");
      ctx.fillStyle = core;
      ctx.beginPath();
      ctx.arc(0, 0, size * 0.40, 0, TAU);
      ctx.fill();

      ctx.strokeStyle = `rgba(255, 247, 220, ${0.28 + bloom * 0.18})`;
      ctx.lineWidth = 1;
      for (let i = 0; i < 5; i++) {
        const angle = i * (TAU / 5) + flower.phase * 0.16;
        ctx.beginPath();
        ctx.moveTo(Math.cos(angle) * size * 0.10, Math.sin(angle) * size * 0.10);
        ctx.lineTo(Math.cos(angle) * size * 0.28, Math.sin(angle) * size * 0.28);
        ctx.stroke();
      }

      for (let i = 0; i < 6; i++) {
        const a = flower.phase * 0.8 + i * (TAU / 6);
        const px = Math.cos(a) * size * 0.42;
        const py = Math.sin(a) * size * 0.18 - size * 0.2;
        const mote = ctx.createRadialGradient(px, py, 0, px, py, size * 0.18);
        mote.addColorStop(0, `rgba(255, 249, 228, ${0.30 + bloom * 0.12})`);
        mote.addColorStop(1, "rgba(255, 249, 228, 0)");
        ctx.fillStyle = mote;
        ctx.beginPath();
        ctx.arc(px, py, size * 0.18, 0, TAU);
        ctx.fill();
      }

      ctx.restore();
    }

    function drawStar(star) {
      const pulse = Math.sin(star.phase) * 0.08 + 1;
      const r = star.r * pulse * star.life;
      ctx.save();
      ctx.translate(star.x, star.y);
      ctx.rotate(star.phase * 0.38);
      ctx.globalAlpha = star.life;
      ctx.globalCompositeOperation = "lighter";

      const colorA = star.kind === "gold" ? "255, 231, 160" : "226, 244, 255";
      const colorB = star.kind === "gold" ? "255, 187, 222" : "202, 178, 255";

      const halo = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 5.2);
      halo.addColorStop(0, `rgba(${colorA}, 0.62)`);
      halo.addColorStop(0.28, `rgba(${colorB}, 0.22)`);
      halo.addColorStop(1, `rgba(${colorB}, 0)`);
      ctx.fillStyle = halo;
      ctx.beginPath();
      ctx.arc(0, 0, r * 5.2, 0, TAU);
      ctx.fill();

      const crystal = ctx.createLinearGradient(-r, -r, r, r);
      crystal.addColorStop(0, `rgba(255,255,255,0.98)`);
      crystal.addColorStop(0.45, `rgba(${colorA},0.86)`);
      crystal.addColorStop(1, `rgba(${colorB},0.86)`);
      ctx.fillStyle = crystal;
      ctx.strokeStyle = "rgba(255,255,255,0.78)";
      ctx.lineWidth = 1.4;
      ctx.shadowBlur = 18;
      ctx.shadowColor = `rgba(${colorA},0.8)`;
      ctx.beginPath();
      ctx.moveTo(0, -r * 1.7);
      ctx.lineTo(r * 0.55, -r * 0.3);
      ctx.lineTo(r * 1.45, 0);
      ctx.lineTo(r * 0.55, r * 0.34);
      ctx.lineTo(0, r * 1.75);
      ctx.lineTo(-r * 0.55, r * 0.34);
      ctx.lineTo(-r * 1.45, 0);
      ctx.lineTo(-r * 0.55, -r * 0.3);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      ctx.globalAlpha = star.life * 0.65;
      ctx.strokeStyle = "rgba(255,255,255,0.72)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, -r * 2.5);
      ctx.lineTo(0, r * 2.5);
      ctx.moveTo(-r * 2.5, 0);
      ctx.lineTo(r * 2.5, 0);
      ctx.stroke();

      ctx.restore();
    }

    function drawConstellationRifts(time) {
      if (state.level !== 2 || state.constellation.rifts.length === 0) return;
      ctx.save();

      for (const rift of state.constellation.rifts) {
        ctx.save();
        ctx.translate(rift.x, rift.y);
        ctx.rotate(Math.sin(time * 0.0008 + rift.phase) * 0.28);

        const pulse = 1 + Math.sin(time * 0.0015 + rift.phase) * 0.035 + rift.pulse * 0.10;
        const r = rift.r * pulse;

        // 月影薄纱：现在只作为氛围，不作为硬障碍
        ctx.globalCompositeOperation = "source-over";
        const veil = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 1.35);
        veil.addColorStop(0, `rgba(16, 18, 42, ${0.055 + rift.pulse * 0.035})`);
        veil.addColorStop(0.5, `rgba(58, 52, 112, ${0.038 + rift.pulse * 0.028})`);
        veil.addColorStop(1, "rgba(58, 52, 112, 0)");
        ctx.fillStyle = veil;
        ctx.beginPath();
        ctx.ellipse(0, 0, r * 1.35, r * 0.34, 0, 0, TAU);
        ctx.fill();

        // 边缘只保留极轻的水纹线
        ctx.globalCompositeOperation = "lighter";
        ctx.strokeStyle = `rgba(190, 176, 255, ${0.04 + rift.pulse * 0.08})`;
        ctx.lineWidth = 0.8 + rift.pulse * 0.6;
        ctx.shadowBlur = 6 + rift.pulse * 6;
        ctx.shadowColor = "rgba(160, 142, 255, 0.16)";
        ctx.beginPath();
        ctx.ellipse(0, 0, r * 1.18, r * 0.36, 0, 0, TAU);
        ctx.stroke();

        // 内部水纹线，只提供轻微空间层次
        ctx.strokeStyle = `rgba(220, 232, 255, ${0.022 + rift.pulse * 0.025})`;
        ctx.lineWidth = 1;
        for (let i = -1; i <= 1; i++) {
          ctx.beginPath();
          for (let x = -r * 0.82; x <= r * 0.82; x += 12) {
            const y = i * r * 0.10 + Math.sin(x * 0.055 + time * 0.0012 + rift.phase) * r * 0.025;
            if (x === -r * 0.82) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.stroke();
        }

        // 目前不再作为硬障碍，只保留极轻反馈
        if (rift.pulse > 0.02) {
          ctx.strokeStyle = `rgba(214, 144, 255, ${rift.pulse * 0.16})`;
          ctx.lineWidth = 1.4;
          ctx.beginPath();
          ctx.ellipse(0, 0, r * 1.28, r * 0.43, 0, 0, TAU);
          ctx.stroke();
        }

        ctx.restore();
      }
      ctx.restore();
    }

    function drawEscortGate(time) {
      if (state.level !== 2) return;
      const gate = state.escort.gate;
      ctx.save();
      ctx.translate(gate.x, gate.y);
      ctx.globalCompositeOperation = "lighter";
      const pulse = 1 + state.escort.pulse * 0.18 + Math.sin(time * 0.003) * 0.04;

      const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, gate.r * 2.5 * pulse);
      glow.addColorStop(0, "rgba(255, 240, 190, 0.24)");
      glow.addColorStop(0.45, "rgba(180, 228, 255, 0.18)");
      glow.addColorStop(1, "rgba(180, 228, 255, 0)");
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(0, 0, gate.r * 2.5 * pulse, 0, TAU);
      ctx.fill();

      ctx.strokeStyle = "rgba(255, 245, 210, 0.74)";
      ctx.lineWidth = 3;
      ctx.shadowBlur = 22;
      ctx.shadowColor = "rgba(255, 236, 180, 0.55)";
      ctx.beginPath();
      ctx.arc(0, 0, gate.r * pulse, 0, TAU);
      ctx.stroke();

      ctx.strokeStyle = "rgba(188, 222, 255, 0.52)";
      ctx.lineWidth = 1.6;
      ctx.beginPath();
      ctx.arc(0, 0, gate.r * 0.72, time * 0.001, time * 0.001 + Math.PI * 1.45);
      ctx.stroke();

      if (state.escort.bonusPulse > 0.01 && state.escort.lastBonusText) {
        const p = state.escort.bonusPulse;
        ctx.font = "900 17px system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = `rgba(255, 246, 210, ${p * 0.92})`;
        ctx.shadowBlur = 20;
        ctx.shadowColor = "rgba(255, 232, 178, 0.62)";
        ctx.fillText(state.escort.lastBonusText, 0, -gate.r - 48 - (1 - p) * 16);
      }
      ctx.restore();
    }

    function drawShadowCurrent(current, time) {
      ctx.save();
      ctx.translate(current.x, current.y);
      ctx.globalCompositeOperation = "source-over";
      const g = ctx.createRadialGradient(0, 0, 0, 0, 0, current.r * 2.55);
      g.addColorStop(0, "rgba(30, 24, 72, 0.34)");
      g.addColorStop(0.45, "rgba(68, 52, 140, 0.24)");
      g.addColorStop(1, "rgba(68, 52, 140, 0)");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(0, 0, current.r * 2.55, 0, TAU);
      ctx.fill();

      ctx.globalCompositeOperation = "lighter";
      ctx.strokeStyle = "rgba(156, 132, 255, 0.18)";
      ctx.lineWidth = 1.2;
      ctx.shadowBlur = 14;
      ctx.shadowColor = "rgba(126, 106, 190, 0.34)";
      ctx.beginPath();
      ctx.arc(0, 0, current.r, 0, TAU);
      ctx.stroke();
      ctx.strokeStyle = "rgba(214, 144, 255, 0.12)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(0, 0, current.r + 24 + Math.sin(time * 0.003 + current.phase) * 4, 0, TAU);
      ctx.stroke();
      ctx.restore();
    }

    function drawEscortTethers(time) {
      if (state.level !== 2) return;
      const followers = state.escort.fireflies.filter(fly => fly.following && !fly.delivered && !fly.lost && !fly.scared);
      if (!followers.length) return;

      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      const grabbing = state.gesture.grabbing;

      for (const fly of followers) {
        const dist = Math.hypot(fly.x - state.pointer.x, fly.y - state.pointer.y);
        const alpha = grabbing ? clamp(1 - dist / 150, 0.16, 0.48) : clamp(1 - dist / 210, 0.04, 0.14);
        ctx.strokeStyle = grabbing ? `rgba(255, 232, 178, ${alpha})` : `rgba(190, 235, 255, ${alpha})`;
        ctx.lineWidth = grabbing ? 1.8 : 0.85;
        ctx.shadowBlur = grabbing ? 15 : 8;
        ctx.shadowColor = grabbing ? "rgba(255, 232, 178, 0.56)" : "rgba(190, 235, 255, 0.28)";
        ctx.beginPath();
        ctx.moveTo(state.pointer.x, state.pointer.y);
        const midX = (state.pointer.x + fly.x) / 2 + Math.sin(time * 0.004 + fly.phase) * 7;
        const midY = (state.pointer.y + fly.y) / 2 + Math.cos(time * 0.003 + fly.phase) * 7;
        ctx.quadraticCurveTo(midX, midY, fly.x, fly.y);
        ctx.stroke();
      }

      if (grabbing) {
        const ringRadius = 35 + Math.sin(time * 0.006) * 3;
        ctx.strokeStyle = "rgba(255, 232, 178, 0.36)";
        ctx.lineWidth = 2;
        ctx.shadowBlur = 22;
        ctx.shadowColor = "rgba(255, 232, 178, 0.58)";
        ctx.setLineDash([8, 8]);
        ctx.lineDashOffset = -time * 0.04;
        ctx.beginPath();
        ctx.arc(state.pointer.x, state.pointer.y, ringRadius, 0, TAU);
        ctx.stroke();
        ctx.setLineDash([]);
      }
      ctx.restore();
    }

    function drawEscortFirefly(fly, time) {
      if (fly.delivered || fly.lost) return;
      ctx.save();
      ctx.translate(fly.x, fly.y);
      ctx.globalCompositeOperation = "lighter";
      const panic = fly.panic || 0;
      const grabbed = fly.following && state.gesture.grabbing && !fly.scared;
      const pulse = 1 + Math.sin(time * 0.006 + fly.phase) * 0.12 + panic * 0.22 + (grabbed ? 0.18 : 0);
      const r = fly.r * pulse;

      if (fly.scared || panic > 0.45) {
        ctx.strokeStyle = fly.scared ? `rgba(255, 160, 224, ${0.18 + panic * 0.22})` : `rgba(255, 216, 160, ${0.10 + panic * 0.12})`;
        ctx.lineWidth = fly.scared ? 1.8 : 1.1;
        ctx.shadowBlur = 14;
        ctx.shadowColor = fly.scared ? "rgba(214, 144, 255, 0.46)" : "rgba(255, 222, 138, 0.32)";
        ctx.beginPath();
        ctx.moveTo(-Math.cos(fly.phase) * 18, -Math.sin(fly.phase) * 12);
        ctx.lineTo(-Math.cos(fly.phase) * 46, -Math.sin(fly.phase) * 30);
        ctx.stroke();
      }

      const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, r * (grabbed ? 6.4 : 5.1));
      glow.addColorStop(0, fly.scared ? `rgba(255, 190, 220, ${0.68 + panic * 0.18})` : grabbed ? `rgba(255, 250, 214, ${0.88 + panic * 0.08})` : `rgba(255, 246, 180, ${0.68 + panic * 0.18})`);
      glow.addColorStop(0.35, fly.scared ? `rgba(214, 144, 255, ${0.30 + panic * 0.12})` : grabbed ? `rgba(255, 224, 150, ${0.46 + panic * 0.08})` : `rgba(255, 222, 138, ${0.30 + panic * 0.12})`);
      glow.addColorStop(1, "rgba(255, 222, 138, 0)");
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(0, 0, r * 5.1, 0, TAU);
      ctx.fill();

      ctx.fillStyle = fly.scared ? "rgba(255, 220, 246, 0.96)" : grabbed ? "rgba(255, 252, 226, 1)" : "rgba(255, 248, 210, 0.96)";
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, TAU);
      ctx.fill();
      ctx.restore();
    }

    function drawEscortScene(time) {
      if (state.level !== 2) return;
      for (const current of state.escort.currents) drawShadowCurrent(current, time);

      const followers = state.escort.fireflies.filter(fly => fly.following && !fly.delivered && !fly.lost && !fly.scared);
      drawEscortTethers(time);

      if (followers.length >= 4) {
        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        const radius = (state.gesture.grabbing ? 30 : 58) + Math.min(followers.length, 10) * (state.gesture.grabbing ? 2.0 : 4.5);
        ctx.strokeStyle = state.gesture.grabbing
          ? `rgba(255, 232, 178, ${0.22 + Math.min(followers.length, 10) * 0.018})`
          : `rgba(190, 235, 255, ${0.08 + Math.min(followers.length, 10) * 0.012})`;
        ctx.lineWidth = state.gesture.grabbing ? 2.6 : 1.6;
        ctx.shadowBlur = 20;
        ctx.shadowColor = "rgba(255, 226, 160, 0.36)";
        ctx.beginPath();
        ctx.arc(state.pointer.x, state.pointer.y, radius, 0, TAU);
        ctx.stroke();
        ctx.restore();
      }

      for (const fly of state.escort.fireflies) drawEscortFirefly(fly, time);
      drawEscortGate(time);
    }

    function drawSealScene(time) {
      if (state.level !== 2) return;
      const seal = state.seal;
      const lake = seal.lake;
      const progress = clamp(seal.progress / seal.targetProgress, 0, 1);

      ctx.save();

      // Dark moon lake
      ctx.globalCompositeOperation = "source-over";
      const lakeGradient = ctx.createRadialGradient(lake.x, lake.y, 0, lake.x, lake.y, lake.rx);
      lakeGradient.addColorStop(0, "rgba(12, 14, 38, 0.58)");
      lakeGradient.addColorStop(0.55, "rgba(32, 28, 74, 0.42)");
      lakeGradient.addColorStop(1, "rgba(70, 60, 130, 0.02)");
      ctx.fillStyle = lakeGradient;
      ctx.beginPath();
      ctx.ellipse(lake.x, lake.y, lake.rx, lake.ry, 0, 0, TAU);
      ctx.fill();

      // Sealed area glow as progress ring/fill
      ctx.globalCompositeOperation = "lighter";
      ctx.strokeStyle = `rgba(255, 236, 180, ${0.18 + progress * 0.44})`;
      ctx.lineWidth = 5;
      ctx.shadowBlur = 24 + progress * 28;
      ctx.shadowColor = "rgba(255, 236, 180, 0.56)";
      ctx.beginPath();
      ctx.ellipse(lake.x, lake.y, lake.rx + 8, lake.ry + 8, 0, -Math.PI / 2, -Math.PI / 2 + TAU * progress);
      ctx.stroke();

      const fillGlow = ctx.createRadialGradient(lake.x, lake.y, 0, lake.x, lake.y, lake.rx);
      fillGlow.addColorStop(0, `rgba(164, 230, 255, ${progress * 0.055})`);
      fillGlow.addColorStop(0.65, `rgba(255, 236, 180, ${progress * 0.035})`);
      fillGlow.addColorStop(1, "rgba(255, 236, 180, 0)");
      ctx.fillStyle = fillGlow;
      ctx.beginPath();
      ctx.ellipse(lake.x, lake.y, lake.rx, lake.ry, 0, 0, TAU);
      ctx.fill();

      // Sealed patches:让每次成功绘制都留下可见成果
      for (const patch of seal.patches) {
        const a = clamp(patch.life, 0, 1);
        ctx.save();
        ctx.translate(patch.x, patch.y);
        ctx.rotate(patch.angle);
        const patchGlow = ctx.createRadialGradient(0, 0, 0, 0, 0, patch.rx * 1.25);
        patchGlow.addColorStop(0, `rgba(255, 246, 210, ${0.09 * a})`);
        patchGlow.addColorStop(0.52, `rgba(164, 230, 255, ${0.07 * a})`);
        patchGlow.addColorStop(1, "rgba(164, 230, 255, 0)");
        ctx.fillStyle = patchGlow;
        ctx.beginPath();
        ctx.ellipse(0, 0, patch.rx, patch.ry, 0, 0, TAU);
        ctx.fill();
        ctx.strokeStyle = `rgba(255, 246, 210, ${0.10 * a})`;
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.ellipse(0, 0, patch.rx * 0.96, patch.ry * 0.9, 0, 0, TAU);
        ctx.stroke();
        ctx.restore();
      }

      // Current seal line
      if (seal.path.length > 1) {
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        for (let pass = 0; pass < 3; pass++) {
          ctx.beginPath();
          for (let i = 0; i < seal.path.length; i++) {
            const p = seal.path[i];
            if (i === 0) ctx.moveTo(p.x, p.y);
            else ctx.lineTo(p.x, p.y);
          }
          ctx.strokeStyle = pass === 2 ? "rgba(255, 246, 210, 0.88)" : `rgba(190, 244, 255, ${0.10 + pass * 0.08})`;
          ctx.lineWidth = pass === 0 ? 30 : pass === 1 ? 13 : 4;
          ctx.shadowBlur = pass === 2 ? 26 : 12;
          ctx.shadowColor = "rgba(210, 238, 255, 0.62)";
          ctx.stroke();
        }
      }

      // Seal enemies inside lake
      for (const enemy of seal.enemies) drawSealEnemy(enemy, time);

      // Progress text
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = "800 15px system-ui, sans-serif";
      ctx.fillStyle = "rgba(255, 244, 206, 0.82)";
      ctx.shadowBlur = 18;
      ctx.shadowColor = "rgba(255, 236, 180, 0.42)";
      ctx.fillText(`封印 ${Math.round(seal.progress)}% / ${seal.targetProgress}%`, lake.x, lake.y - lake.ry - 34);

      if (seal.gradePulse > 0.01 && seal.lastGrade) {
        const p = seal.gradePulse;
        ctx.font = "900 18px system-ui, sans-serif";
        ctx.fillStyle = `rgba(255, 246, 210, ${0.92 * p})`;
        ctx.shadowBlur = 22;
        ctx.shadowColor = "rgba(255, 236, 180, 0.62)";
        ctx.fillText(seal.lastGrade, lake.x, lake.y - lake.ry - 66 - (1 - p) * 18);
      }

      if (seal.breakPulse > 0.01) {
        ctx.strokeStyle = `rgba(214, 144, 255, ${seal.breakPulse * 0.42})`;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.ellipse(lake.x, lake.y, lake.rx + 22 * (1 - seal.breakPulse), lake.ry + 22 * (1 - seal.breakPulse), 0, 0, TAU);
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawSealEnemy(enemy, time) {
      ctx.save();
      ctx.translate(enemy.x, enemy.y);
      const r = enemy.r * (1 + Math.sin(time * 0.003 + enemy.phase) * 0.06 + enemy.pulse * 0.16);
      ctx.globalCompositeOperation = "lighter";
      const outer = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 2.2);
      outer.addColorStop(0, "rgba(112, 88, 210, 0.12)");
      outer.addColorStop(0.5, "rgba(78, 61, 155, 0.20)");
      outer.addColorStop(1, "rgba(78, 61, 155, 0)");
      ctx.fillStyle = outer;
      ctx.beginPath();
      ctx.arc(0, 0, r * 2.2, 0, TAU);
      ctx.fill();

      ctx.globalCompositeOperation = "source-over";
      const core = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 1.2);
      core.addColorStop(0, "rgba(4, 4, 12, 0.82)");
      core.addColorStop(0.58, "rgba(24, 18, 52, 0.68)");
      core.addColorStop(1, "rgba(43, 35, 82, 0)");
      ctx.fillStyle = core;
      ctx.beginPath();
      ctx.arc(0, 0, r * 1.2, 0, TAU);
      ctx.fill();

      ctx.globalCompositeOperation = "lighter";
      ctx.strokeStyle = `rgba(168, 136, 255, ${0.22 + enemy.pulse * 0.24})`;
      ctx.lineWidth = 1.4 + enemy.pulse;
      ctx.shadowBlur = 14;
      ctx.shadowColor = "rgba(143, 112, 255, 0.48)";
      ctx.beginPath();
      for (let a = 0; a <= TAU + 0.2; a += 0.24) {
        const wobble = Math.sin(a * 4 + time * 0.002 + enemy.phase) * r * 0.08;
        const rr = r * 0.82 + wobble;
        const x = Math.cos(a) * rr;
        const y = Math.sin(a) * rr;
        if (a === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.restore();
    }

    function drawRefractionScene(time) {
      if (state.level !== 2) return;
      const ref = state.refraction;
      const source = ref.source;
      const currentPrism = getCurrentPrism();
      const anchor = getRefractionAnchor();
      const charge = clamp(ref.charge / ref.chargeTarget, 0, 1);

      ctx.save();
      ctx.globalCompositeOperation = "lighter";

      // Moon source
      const sourceGlow = ctx.createRadialGradient(source.x, source.y, 0, source.x, source.y, 82);
      sourceGlow.addColorStop(0, "rgba(255,255,255,0.92)");
      sourceGlow.addColorStop(0.28, "rgba(210,238,255,0.32)");
      sourceGlow.addColorStop(1, "rgba(210,238,255,0)");
      ctx.fillStyle = sourceGlow;
      ctx.beginPath();
      ctx.arc(source.x, source.y, 82, 0, TAU);
      ctx.fill();
      ctx.fillStyle = "rgba(255,255,255,0.92)";
      ctx.beginPath();
      ctx.arc(source.x, source.y, 11, 0, TAU);
      ctx.fill();

      // Fixed completed light paths
      for (const seg of ref.completedSegments) {
        const g = ctx.createLinearGradient(seg.from.x, seg.from.y, seg.to.x, seg.to.y);
        g.addColorStop(0, `rgba(255,250,220,${0.36 + seg.strength * 0.28})`);
        g.addColorStop(0.55, `rgba(190,244,255,${0.18 + seg.strength * 0.24})`);
        g.addColorStop(1, seg.final ? "rgba(255,226,178,0.68)" : `rgba(220,190,255,${0.18 + seg.strength * 0.24})`);
        ctx.beginPath();
        ctx.moveTo(seg.from.x, seg.from.y);
        ctx.lineTo(seg.to.x, seg.to.y);
        ctx.strokeStyle = g;
        ctx.lineWidth = seg.final ? 6 : 4;
        ctx.shadowBlur = seg.final ? 34 : 22;
        ctx.shadowColor = seg.final ? "rgba(255,236,180,0.72)" : "rgba(205,235,255,0.48)";
        ctx.stroke();
      }

      // Live moon beam: current anchor -> pointer
      if (currentPrism) {
        const activeLit = clamp(currentPrism.lit || 0, 0, 1);
        const beam = ctx.createLinearGradient(anchor.x, anchor.y, state.pointer.x, state.pointer.y);
        beam.addColorStop(0, "rgba(255,250,225,0.66)");
        beam.addColorStop(0.55, `rgba(205,235,255,${0.18 + activeLit * 0.22})`);
        beam.addColorStop(1, `rgba(205,184,255,${0.10 + activeLit * 0.18})`);
        ctx.lineCap = "round";
        for (let pass = 0; pass < 3; pass++) {
          ctx.beginPath();
          ctx.moveTo(anchor.x, anchor.y);
          const cx = (anchor.x + state.pointer.x) / 2 + Math.sin(time * 0.002) * 8;
          const cy = (anchor.y + state.pointer.y) / 2 + Math.cos(time * 0.0024) * 8;
          ctx.quadraticCurveTo(cx, cy, state.pointer.x, state.pointer.y);
          ctx.strokeStyle = pass === 2 ? beam : `rgba(202,220,255,${0.05 + pass * 0.06 + activeLit * 0.04})`;
          ctx.lineWidth = pass === 0 ? 32 : pass === 1 ? 13 : 4 + activeLit * 2;
          ctx.shadowBlur = pass === 2 ? 22 + activeLit * 18 : 12;
          ctx.shadowColor = "rgba(210,235,255,0.48)";
          ctx.stroke();
        }

        // Current guide ring
        ctx.strokeStyle = `rgba(255,244,206,${0.08 + activeLit * 0.16})`;
        ctx.lineWidth = 2;
        ctx.setLineDash([10, 14]);
        ctx.lineDashOffset = -time * 0.035;
        ctx.beginPath();
        ctx.arc(currentPrism.x, currentPrism.y, currentPrism.r + 52, 0, TAU);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      // All prisms
      for (const prism of ref.prisms) {
        drawRefractionPrism(prism, time, prism === currentPrism);
      }

      // Target charge ring
      const target = ref.target;
      const totalProgress = clamp(ref.current / ref.prisms.length, 0, 1);
      ctx.strokeStyle = `rgba(255,236,180,${0.14 + totalProgress * 0.52})`;
      ctx.lineWidth = 4;
      ctx.shadowBlur = 18 + totalProgress * 28;
      ctx.shadowColor = "rgba(255,236,180,0.62)";
      ctx.beginPath();
      ctx.arc(target.x, target.y, target.r + 12, -Math.PI / 2, -Math.PI / 2 + TAU * totalProgress);
      ctx.stroke();

      if (currentPrism) {
        ctx.fillStyle = `rgba(255,244,206,${0.72})`;
        ctx.font = "800 15px system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.shadowBlur = 16;
        ctx.shadowColor = "rgba(255,232,178,0.5)";
        ctx.fillText(`棱镜 ${ref.current + 1}/3 · ${Math.round(charge * 100)}%`, currentPrism.x, currentPrism.y - currentPrism.r - 54);
      }

      ctx.restore();
    }

    function drawRefractionPrism(prism, time, isCurrent) {
      const lit = clamp(prism.lit || 0, 0, 1);
      ctx.save();
      ctx.translate(prism.x, prism.y);
      ctx.rotate(Math.PI / 4 + Math.sin(time * 0.0012 + prism.index) * 0.08);

      const prismGlow = ctx.createRadialGradient(0, 0, 0, 0, 0, prism.r * (2.7 + lit));
      prismGlow.addColorStop(0, `rgba(255,255,255,${0.14 + lit * 0.32})`);
      prismGlow.addColorStop(0.42, `rgba(190,244,255,${0.10 + lit * 0.28})`);
      prismGlow.addColorStop(1, "rgba(190,244,255,0)");
      ctx.fillStyle = prismGlow;
      ctx.beginPath();
      ctx.arc(0, 0, prism.r * (2.7 + lit), 0, TAU);
      ctx.fill();

      const crystal = ctx.createLinearGradient(-prism.r, -prism.r, prism.r, prism.r);
      crystal.addColorStop(0, "rgba(255,255,255,0.94)");
      crystal.addColorStop(0.45, `rgba(195,238,255,${0.36 + lit * 0.42})`);
      crystal.addColorStop(1, `rgba(218,190,255,${0.34 + lit * 0.42})`);
      ctx.fillStyle = crystal;
      ctx.strokeStyle = `rgba(255,255,255,${isCurrent ? 0.72 : 0.38 + lit * 0.28})`;
      ctx.lineWidth = isCurrent ? 2.5 : 1.5 + lit;
      ctx.shadowBlur = 18 + lit * 28;
      ctx.shadowColor = isCurrent ? "rgba(255,236,180,0.68)" : "rgba(205,235,255,0.52)";
      ctx.beginPath();
      ctx.moveTo(0, -prism.r);
      ctx.lineTo(prism.r * 0.72, 0);
      ctx.lineTo(0, prism.r);
      ctx.lineTo(-prism.r * 0.72, 0);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      ctx.rotate(-Math.PI / 4);
      ctx.fillStyle = `rgba(255,255,255,${isCurrent ? 0.95 : 0.56})`;
      ctx.font = "800 13px system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(String(prism.index + 1), 0, prism.r + 20);
      ctx.restore();
    }

    function drawConstellation(time) {
      if (state.level !== 2 || state.constellation.nodes.length === 0) return;

      const nodes = state.constellation.nodes;
      drawConstellationRifts(time);
      ctx.save();
      ctx.globalCompositeOperation = "lighter";

      for (let i = 0; i < nodes.length - 1; i++) {
        const a = nodes[i];
        const b = nodes[i + 1];
        const active = a.lit && b.lit;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = active ? "rgba(255, 240, 190, 0.70)" : "rgba(150, 168, 230, 0.045)";
        ctx.lineWidth = active ? 3.2 : 1;
        ctx.shadowBlur = active ? 18 : 4;
        ctx.shadowColor = active ? "rgba(255, 232, 178, 0.64)" : "rgba(180, 205, 255, 0.16)";
        ctx.stroke();
      }

      drawLiveBeam(time);
      drawConstellationCorridor(time);
      for (const node of nodes) drawConstellationNode(node, time);
      drawResonanceBadge(time);

      if (state.constellation.wrongPulse > 0.01) {
        const a = state.constellation.wrongPulse;
        ctx.strokeStyle = `rgba(214, 144, 255, ${a * 0.22})`;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(state.pointer.x, state.pointer.y, 46 + (1 - a) * 24, 0, TAU);
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawConstellationCorridor(time) {
      const nodes = state.constellation.nodes;
      const current = nodes[state.constellation.current];
      const anchor = nodes[state.constellation.current - 1];
      if (!current || !anchor || state.constellation.completed) return;

      const stability = state.constellation.beamStability;
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(anchor.x, anchor.y);
      ctx.lineTo(current.x, current.y);
      ctx.strokeStyle = `rgba(225, 235, 255, ${0.026 + stability * 0.030})`;
      ctx.lineWidth = 74;
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(anchor.x, anchor.y);
      ctx.lineTo(current.x, current.y);
      ctx.strokeStyle = `rgba(255, 244, 206, ${0.06 + stability * 0.09})`;
      ctx.lineWidth = 2;
      ctx.setLineDash([12, 16]);
      ctx.lineDashOffset = -time * 0.025;
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }

    function drawResonanceBadge(time) {
      if (state.level !== 2 || state.constellation.lastGradePulse <= 0.01 || !state.constellation.lastGradeText) return;
      const pulse = state.constellation.lastGradePulse;
      const nodes = state.constellation.nodes;
      const idx = Math.max(0, state.constellation.current - 1);
      const node = nodes[idx];
      if (!node) return;

      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = "800 16px system-ui, sans-serif";
      ctx.fillStyle = `rgba(255, 244, 206, ${pulse * 0.92})`;
      ctx.shadowBlur = 20;
      ctx.shadowColor = "rgba(255, 232, 178, 0.62)";
      ctx.fillText(state.constellation.lastGradeText, node.x, node.y - 56 - (1 - pulse) * 16);
      ctx.restore();
    }

    function drawLiveBeam(time) {
      const nodes = state.constellation.nodes;
      const current = nodes[state.constellation.current];
      const anchor = nodes[state.constellation.current - 1];
      if (!current || !anchor || state.constellation.completed) return;

      const stability = state.constellation.beamStability;
      const chargeTarget = getNodeChargeTarget(current);
      const charge = clamp(state.constellation.beamCharge / chargeTarget, 0, 1);
      const resonanceRatio = state.constellation.resonanceMax > 0
        ? clamp(state.constellation.resonance / state.constellation.resonanceMax, 0, 1)
        : stability;
      const breakPulse = state.constellation.breakPulse;
      const px = state.pointer.x;
      const py = state.pointer.y;
      const blocked = false;

      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      const guideAlpha = 0.10 + stability * 0.10;
      ctx.beginPath();
      ctx.moveTo(anchor.x, anchor.y);
      ctx.lineTo(current.x, current.y);
      ctx.strokeStyle = `rgba(210, 228, 255, ${guideAlpha})`;
      ctx.lineWidth = 18;
      ctx.shadowBlur = 12;
      ctx.shadowColor = "rgba(170, 200, 255, 0.22)";
      ctx.stroke();

      const beamGradient = ctx.createLinearGradient(anchor.x, anchor.y, px, py);
      beamGradient.addColorStop(0, `rgba(255, 244, 206, ${0.48 + stability * 0.22 + resonanceRatio * 0.12})`);
      beamGradient.addColorStop(0.55, `rgba(206, 232, 255, ${0.24 + stability * 0.26 + resonanceRatio * 0.12})`);
      beamGradient.addColorStop(1, blocked || breakPulse > 0.05 ? `rgba(210,176,255,${0.16 + Math.max(breakPulse, blocked ? 0.28 : 0) * 0.32})` : `rgba(202, 184, 255, ${0.14 + stability * 0.40})`);

      for (let pass = 0; pass < 3; pass++) {
        ctx.beginPath();
        ctx.moveTo(anchor.x, anchor.y);
        const midX = (anchor.x + px) / 2 + Math.sin(time * 0.003) * 7;
        const midY = (anchor.y + py) / 2 + Math.cos(time * 0.0024) * 7;
        ctx.quadraticCurveTo(midX, midY, px, py);
        ctx.strokeStyle = pass === 2 ? beamGradient : `rgba(202, 184, 255, ${0.07 + pass * 0.08 + stability * 0.06})`;
        ctx.lineWidth = pass === 0 ? 28 : pass === 1 ? 12 : 3.5 + charge * 2.5 + resonanceRatio * 1.5;
        ctx.shadowBlur = pass === 2 ? 18 + charge * 24 + breakPulse * 18 + resonanceRatio * 16 : 12;
        ctx.shadowColor = blocked || breakPulse > 0.05 ? "rgba(180, 152, 255, 0.42)" : charge > 0.1 ? "rgba(255, 238, 184, 0.72)" : "rgba(188, 206, 255, 0.38)";
        ctx.stroke();
      }

      if (charge > 0.02) {
        ctx.strokeStyle = current.type === "quick"
          ? `rgba(190, 244, 255, ${charge * 0.72})`
          : current.type === "rhythm"
            ? `rgba(255, 216, 246, ${charge * 0.68})`
            : `rgba(255, 244, 206, ${charge * 0.62})`;
        ctx.lineWidth = 2 + charge * 4;
        ctx.beginPath();
        ctx.arc(current.x, current.y, 34 + charge * 16, 0, TAU);
        ctx.stroke();
      }

      if (current.type === "quick") {
        const timeRatio = clamp(1 - state.constellation.segmentTimer / 3.2, 0, 1);
        ctx.strokeStyle = `rgba(190, 244, 255, ${0.12 + timeRatio * 0.28})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(current.x, current.y, 62 + timeRatio * 18, -Math.PI / 2, -Math.PI / 2 + TAU * timeRatio);
        ctx.stroke();
      }

      if (current.type === "rhythm") {
        const rhythm = getRhythmWindow(current);
        ctx.strokeStyle = `rgba(255, 216, 246, ${0.08 + rhythm * 0.30})`;
        ctx.lineWidth = 2 + rhythm * 2;
        ctx.beginPath();
        ctx.arc(current.x, current.y, 58 + rhythm * 18, 0, TAU);
        ctx.stroke();
      }

      if (resonanceRatio > 0.08) {
        ctx.strokeStyle = `rgba(255, 232, 178, ${resonanceRatio * 0.32})`;
        ctx.lineWidth = 1.2;
        ctx.setLineDash([4, 10]);
        ctx.lineDashOffset = -time * 0.045;
        ctx.beginPath();
        ctx.arc(anchor.x, anchor.y, 28 + resonanceRatio * 20, 0, TAU);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      if (breakPulse > 0.04) {
        ctx.strokeStyle = `rgba(210, 176, 255, ${breakPulse * 0.30})`;
        ctx.lineWidth = 2 + breakPulse * 4;
        ctx.setLineDash([8, 12]);
        ctx.beginPath();
        ctx.moveTo(anchor.x, anchor.y);
        ctx.lineTo(px, py);
        ctx.stroke();
        ctx.setLineDash([]);
      }
      ctx.restore();
    }

    function drawConstellationNode(node, time) {
      const isCurrent = node.index === state.constellation.current && !node.lit;
      const lit = node.lit;
      const pulse = 1 + Math.sin(time * 0.003 + node.pulse) * 0.08 + node.touchPulse * 0.26;
      const r = (lit ? 15 : isCurrent ? 18 : 11) * pulse;
      const twinkle = 0.5 + Math.sin(time * 0.006 + node.pulse * 2) * 0.5;

      ctx.save();
      ctx.translate(node.x, node.y);
      ctx.globalCompositeOperation = "lighter";

      const halo = ctx.createRadialGradient(0, 0, 0, 0, 0, r * (isCurrent ? 5.9 : 4.6));
      if (lit) {
        halo.addColorStop(0, "rgba(255, 246, 210, 0.74)");
        halo.addColorStop(0.30, "rgba(255, 222, 176, 0.30)");
        halo.addColorStop(0.52, "rgba(196, 238, 255, 0.15)");
      } else if (isCurrent) {
        halo.addColorStop(0, "rgba(226, 244, 255, 0.76)");
        halo.addColorStop(0.35, "rgba(202, 184, 255, 0.32)");
        halo.addColorStop(0.58, "rgba(190, 244, 255, 0.10)");
      } else {
        halo.addColorStop(0, "rgba(160, 175, 242, 0.30)");
        halo.addColorStop(0.45, "rgba(110, 118, 190, 0.12)");
      }
      halo.addColorStop(1, "rgba(150, 165, 235, 0)");
      ctx.fillStyle = halo;
      ctx.beginPath();
      ctx.arc(0, 0, r * (isCurrent ? 5.9 : 4.6), 0, TAU);
      ctx.fill();

      ctx.strokeStyle = lit
        ? `rgba(255, 243, 206, ${0.18 + twinkle * 0.12})`
        : isCurrent
          ? `rgba(202, 244, 255, ${0.18 + twinkle * 0.12})`
          : "rgba(210,220,255,0.16)";
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.arc(0, 0, r * 2.55, 0, TAU);
      ctx.stroke();

      ctx.save();
      ctx.rotate(time * 0.0009 + node.index * 0.2);
      ctx.strokeStyle = lit ? "rgba(255, 236, 188, 0.48)" : isCurrent ? "rgba(204, 236, 255, 0.44)" : "rgba(188, 198, 246, 0.18)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-r * 1.6, 0);
      ctx.lineTo(r * 1.6, 0);
      ctx.moveTo(0, -r * 1.6);
      ctx.lineTo(0, r * 1.6);
      ctx.moveTo(-r * 1.15, -r * 1.15);
      ctx.lineTo(r * 1.15, r * 1.15);
      ctx.moveTo(r * 1.15, -r * 1.15);
      ctx.lineTo(-r * 1.15, r * 1.15);
      ctx.stroke();
      ctx.restore();

      if (lit) {
        for (let i = 0; i < 4; i++) {
          const a = time * 0.0016 + i * (TAU / 4);
          const px = Math.cos(a) * r * 1.9;
          const py = Math.sin(a) * r * 1.9;
          const mote = ctx.createRadialGradient(px, py, 0, px, py, r * 0.48);
          mote.addColorStop(0, "rgba(255, 248, 226, 0.42)");
          mote.addColorStop(1, "rgba(255, 248, 226, 0)");
          ctx.fillStyle = mote;
          ctx.beginPath();
          ctx.arc(px, py, r * 0.48, 0, TAU);
          ctx.fill();
        }
      }

      ctx.rotate(Math.PI / 4);
      const crystal = ctx.createLinearGradient(-r, -r, r, r);
      crystal.addColorStop(0, "rgba(255,255,255,0.96)");
      crystal.addColorStop(0.5, lit ? "rgba(255,238,184,0.94)" : isCurrent ? "rgba(214,236,255,0.92)" : "rgba(150,160,220,0.56)");
      crystal.addColorStop(1, lit ? "rgba(220,190,255,0.82)" : "rgba(100,110,180,0.42)");
      ctx.fillStyle = crystal;
      ctx.strokeStyle = lit || isCurrent ? "rgba(255,255,255,0.80)" : "rgba(210,220,255,0.24)";
      ctx.lineWidth = 1.4;
      ctx.shadowBlur = lit || isCurrent ? 24 : 8;
      ctx.shadowColor = lit ? "rgba(255,232,178,0.72)" : "rgba(190,220,255,0.35)";
      ctx.beginPath();
      ctx.moveTo(0, -r);
      ctx.lineTo(r * 0.72, 0);
      ctx.lineTo(0, r);
      ctx.lineTo(-r * 0.72, 0);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.rotate(-Math.PI / 4);

      if (isCurrent) {
        const charge = clamp(state.constellation.beamCharge / getNodeChargeTarget(node), 0, 1);
        ctx.strokeStyle = node.type === "rhythm"
          ? `rgba(255,216,246,${0.34 + charge * 0.40})`
          : node.type === "quick"
            ? `rgba(190,244,255,${0.36 + charge * 0.38})`
            : `rgba(255,255,255,${0.36 + charge * 0.36})`;
        ctx.lineWidth = 1.5 + charge * 2.2;
        ctx.beginPath();
        ctx.arc(0, 0, r * (2.10 + charge * 0.55), 0, TAU);
        ctx.stroke();
      }

      ctx.fillStyle = lit ? "rgba(255,245,210,0.96)" : "rgba(235,242,255,0.66)";
      ctx.font = "700 13px system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(String(node.index + 1), 0, r * 3.0);

      ctx.restore();
    }

    function drawDefenseEnemy(enemy, time) {
      if (enemy.spawnDelay > 0) return;

      ctx.save();
      ctx.translate(enemy.x, enemy.y);
      const r = enemy.r * (1 + Math.sin(time * 0.003 + enemy.phase) * 0.06 + enemy.hitPulse * 0.18);
      const isSwift = enemy.type === "swift";
      const isHeavy = enemy.type === "heavy";

      ctx.globalCompositeOperation = "lighter";

      if (enemy.warningTrail && enemy.warningTrail.length > 1) {
        for (let i = enemy.warningTrail.length - 1; i >= 0; i--) {
          const t = enemy.warningTrail[i];
          const alpha = t.life * (isSwift ? 0.18 : 0.1);
          const gTrail = ctx.createRadialGradient(t.x - enemy.x, t.y - enemy.y, 0, t.x - enemy.x, t.y - enemy.y, r * 1.25);
          gTrail.addColorStop(0, `rgba(112, 88, 210, ${alpha})`);
          gTrail.addColorStop(1, "rgba(112, 88, 210, 0)");
          ctx.fillStyle = gTrail;
          ctx.beginPath();
          ctx.arc(t.x - enemy.x, t.y - enemy.y, r * 1.25, 0, TAU);
          ctx.fill();
        }
      }

      const outer = ctx.createRadialGradient(0, 0, 0, 0, 0, r * (isHeavy ? 2.65 : 2.35));
      outer.addColorStop(0, isSwift ? "rgba(160, 132, 255, 0.16)" : "rgba(126, 98, 225, 0.12)");
      outer.addColorStop(0.48, isHeavy ? "rgba(116, 70, 170, 0.26)" : "rgba(80, 62, 160, 0.22)");
      outer.addColorStop(1, "rgba(80, 62, 160, 0)");
      ctx.fillStyle = outer;
      ctx.beginPath();
      ctx.arc(0, 0, r * 2.35, 0, TAU);
      ctx.fill();

      ctx.globalCompositeOperation = "source-over";
      const core = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 1.28);
      core.addColorStop(0, "rgba(3, 3, 10, 0.86)");
      core.addColorStop(0.55, "rgba(24, 18, 52, 0.70)");
      core.addColorStop(1, "rgba(43, 35, 82, 0)");
      ctx.fillStyle = core;
      ctx.beginPath();
      ctx.arc(0, 0, r * 1.28, 0, TAU);
      ctx.fill();

      ctx.globalCompositeOperation = "lighter";
      ctx.strokeStyle = isSwift ? "rgba(196, 172, 255, 0.38)" : isHeavy ? "rgba(190, 112, 255, 0.30)" : "rgba(168, 136, 255, 0.28)";
      ctx.lineWidth = isHeavy ? 2.2 : 1.6;
      ctx.shadowBlur = 16;
      ctx.shadowColor = "rgba(143, 112, 255, 0.52)";
      ctx.beginPath();
      for (let a = 0; a <= TAU + 0.2; a += 0.22) {
        const wobble = Math.sin(a * (isSwift ? 6 : 4) + time * (isSwift ? 0.004 : 0.002) + enemy.phase) * r * (isHeavy ? 0.1 : 0.08);
        const rr = r * 0.82 + wobble;
        const x = Math.cos(a) * rr;
        const y = Math.sin(a) * rr;
        if (a === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();

      ctx.strokeStyle = "rgba(214, 144, 255, 0.14)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(0, 0, r * 1.18, 0, TAU);
      ctx.stroke();
      ctx.restore();
    }

    function drawDefenseScene(time) {
      if (state.level !== 3) return;

      const core = getDefenseCorePoint();
      ctx.save();
      ctx.globalCompositeOperation = "lighter";

      const danger = state.defense.coreHitPulse;
      ctx.strokeStyle = `rgba(255, 236, 180, ${0.16 + danger * 0.34})`;
      ctx.lineWidth = 2 + danger * 4;
      ctx.shadowBlur = 24 + danger * 34;
      ctx.shadowColor = danger > 0.1 ? "rgba(214, 144, 255, 0.72)" : "rgba(255, 236, 180, 0.42)";
      ctx.beginPath();
      ctx.arc(core.x, core.y, 70 + Math.sin(time * 0.003) * 4 + danger * 16, 0, TAU);
      ctx.stroke();

      const progress = clamp(state.defense.survived / state.defense.duration, 0, 1);
      ctx.strokeStyle = `rgba(190, 244, 255, ${0.12 + progress * 0.25})`;
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.arc(core.x, core.y, 84, -Math.PI / 2, -Math.PI / 2 + TAU * progress);
      ctx.stroke();

      for (const enemy of state.defense.enemies) drawDefenseEnemy(enemy, time);
      ctx.restore();
    }

    function drawFog(fog, time) {
      if (fog.purifiedTimer > 0) {
        drawPurifiedFog(fog, time);
        return;
      }
      ctx.save();
      ctx.translate(fog.x, fog.y);
      const pulse = 1 + Math.sin(time * 0.002 + fog.phase) * 0.05 + fog.hitPulse * 0.18;
      const r = fog.r * pulse;
      const swirl = time * 0.00055 + fog.phase;
      ctx.globalCompositeOperation = "source-over";

      const ground = ctx.createRadialGradient(0, r * 0.65, 0, 0, r * 0.65, r * 2.8);
      ground.addColorStop(0, "rgba(18, 12, 36, 0.14)");
      ground.addColorStop(1, "rgba(18, 12, 36, 0)");
      ctx.fillStyle = ground;
      ctx.beginPath();
      ctx.ellipse(0, r * 0.72, r * 2.2, r * 0.96, 0, 0, TAU);
      ctx.fill();

      const aura = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 3.1);
      aura.addColorStop(0, `rgba(18, 16, 46, ${0.12 + fog.hitPulse * 0.05})`);
      aura.addColorStop(0.34, `rgba(50, 34, 106, ${0.28 + fog.hitPulse * 0.10})`);
      aura.addColorStop(0.70, `rgba(98, 58, 162, ${0.17 + fog.hitPulse * 0.07})`);
      aura.addColorStop(1, "rgba(98, 58, 162, 0)");
      ctx.fillStyle = aura;
      ctx.beginPath();
      ctx.arc(0, 0, r * 3.1, 0, TAU);
      ctx.fill();

      for (let layer = 0; layer < 4; layer++) {
        ctx.save();
        ctx.rotate(swirl * (0.7 + layer * 0.18) + layer * 1.1);
        ctx.scale(1 + layer * 0.08, 0.82 + layer * 0.05);
        const body = ctx.createRadialGradient(0, 0, r * 0.12, 0, 0, r * (1.22 + layer * 0.12));
        body.addColorStop(0, `rgba(10, 10, 28, ${0.74 - layer * 0.08})`);
        body.addColorStop(0.40, `rgba(36, 26, 76, ${0.56 - layer * 0.09})`);
        body.addColorStop(0.78, `rgba(108, 70, 176, ${0.22 - layer * 0.03})`);
        body.addColorStop(1, "rgba(108, 70, 176, 0)");
        ctx.fillStyle = body;
        ctx.beginPath();
        ctx.ellipse(Math.cos(swirl + layer) * r * 0.10, Math.sin(swirl * 1.2 + layer) * r * 0.08, r * (1.04 + layer * 0.16), r * (0.86 + layer * 0.12), 0, 0, TAU);
        ctx.fill();
        ctx.restore();
      }

      const core = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 1.28);
      core.addColorStop(0, `rgba(2, 2, 8, ${0.94 + fog.hitPulse * 0.04})`);
      core.addColorStop(0.42, `rgba(14, 11, 34, ${0.84 + fog.hitPulse * 0.05})`);
      core.addColorStop(0.86, "rgba(34, 20, 72, 0.14)");
      core.addColorStop(1, "rgba(34, 20, 72, 0)");
      ctx.fillStyle = core;
      ctx.beginPath();
      ctx.arc(0, 0, r * 1.28, 0, TAU);
      ctx.fill();

      ctx.globalCompositeOperation = "lighter";
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = `rgba(196, 146, 255, ${0.22 + fog.hitPulse * 0.24})`;
      ctx.lineWidth = 1.8;
      ctx.shadowBlur = 28 + fog.hitPulse * 24;
      ctx.shadowColor = "rgba(170, 116, 255, 0.76)";
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        const baseR = r * (0.62 + i * 0.24);
        for (let a = 0; a <= TAU + 0.16; a += 0.14) {
          const wobble = Math.sin(a * 4 + swirl * 2.4 + i) * r * 0.10 + Math.cos(a * 2.2 - swirl * 1.2 + i) * r * 0.04;
          const x = Math.cos(a) * (baseR + wobble);
          const y = Math.sin(a) * (baseR + wobble);
          if (a === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }

      ctx.strokeStyle = `rgba(255, 178, 236, ${0.12 + fog.hitPulse * 0.18})`;
      ctx.lineWidth = 1;
      ctx.setLineDash([5, 9]);
      ctx.lineDashOffset = -time * 0.03;
      ctx.beginPath();
      ctx.arc(0, 0, r * 1.52, 0, TAU);
      ctx.stroke();
      ctx.setLineDash([]);

      for (let i = 0; i < 5; i++) {
        const a = swirl * (0.74 + i * 0.08) + i * (TAU / 5);
        const len = r * (1.36 + (i % 2) * 0.16);
        const sx = Math.cos(a) * r * 0.84;
        const sy = Math.sin(a) * r * 0.84;
        const ex = Math.cos(a) * len;
        const ey = Math.sin(a) * len;
        const tendril = ctx.createLinearGradient(sx, sy, ex, ey);
        tendril.addColorStop(0, "rgba(196, 146, 255, 0.18)");
        tendril.addColorStop(0.72, "rgba(136, 92, 214, 0.08)");
        tendril.addColorStop(1, "rgba(136, 92, 214, 0)");
        ctx.strokeStyle = tendril;
        ctx.lineWidth = 1.3;
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.quadraticCurveTo((sx + ex) * 0.5 + Math.sin(swirl + i) * r * 0.22, (sy + ey) * 0.5 + Math.cos(swirl * 1.2 + i) * r * 0.18, ex, ey);
        ctx.stroke();
      }

      for (let i = 0; i < 7; i++) {
        const a = swirl * (0.82 + i * 0.05) + i * (TAU / 7);
        const rr = r * (1.18 + Math.sin(swirl * 2 + i) * 0.08);
        const mx = Math.cos(a) * rr;
        const my = Math.sin(a) * rr;
        const mote = ctx.createRadialGradient(mx, my, 0, mx, my, r * 0.38);
        mote.addColorStop(0, `rgba(255, 218, 242, ${0.16 + fog.hitPulse * 0.10})`);
        mote.addColorStop(0.55, `rgba(196, 146, 255, ${0.08 + fog.hitPulse * 0.05})`);
        mote.addColorStop(1, "rgba(196, 146, 255, 0)");
        ctx.fillStyle = mote;
        ctx.beginPath();
        ctx.arc(mx, my, r * 0.18, 0, TAU);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawPurifiedFog(fog, time) {
      ctx.save();
      ctx.translate(fog.x, fog.y);
      ctx.globalCompositeOperation = "lighter";
      const fade = clamp(fog.purifiedTimer / 4.2, 0, 1);
      const r = fog.r * (1.1 + Math.sin(time * 0.003 + fog.phase) * 0.06);
      const g = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 2.4);
