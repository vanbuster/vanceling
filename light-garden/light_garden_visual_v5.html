      g.addColorStop(0, `rgba(255, 246, 210, ${0.30 * fade})`);
      g.addColorStop(0.28, `rgba(190, 244, 255, ${0.20 * fade})`);
      g.addColorStop(0.68, `rgba(226, 196, 255, ${0.10 * fade})`);
      g.addColorStop(1, "rgba(190, 244, 255, 0)");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(0, 0, r * 2.4, 0, TAU);
      ctx.fill();

      ctx.strokeStyle = `rgba(255, 244, 204, ${0.38 * fade})`;
      ctx.lineWidth = 2;
      ctx.shadowBlur = 24;
      ctx.shadowColor = "rgba(255, 244, 204, 0.72)";
      ctx.beginPath();
      ctx.arc(0, 0, r * (1.25 + (1 - fade) * 0.7), 0, TAU);
      ctx.stroke();

      for (let i = 0; i < 5; i++) {
        const a = time * 0.0016 + i * (TAU / 5) + fog.phase;
        const rr = r * (0.86 + i * 0.06);
        const mx = Math.cos(a) * rr;
        const my = Math.sin(a) * rr;
        const mote = ctx.createRadialGradient(mx, my, 0, mx, my, r * 0.24);
        mote.addColorStop(0, `rgba(255, 248, 226, ${0.30 * fade})`);
        mote.addColorStop(1, "rgba(255, 248, 226, 0)");
        ctx.fillStyle = mote;
        ctx.beginPath();
        ctx.arc(mx, my, r * 0.14, 0, TAU);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawRipples() {
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      for (const ripple of state.ripples) {
        const a = ripple.life / ripple.maxLife;
        ctx.strokeStyle = `rgba(205, 236, 255, ${a * 0.42})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(ripple.x, ripple.y, ripple.r, 0, TAU);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawPointer(time) {
      const { x, y } = state.pointer;
      const t = time || performance.now();
      const breathe = 0.5 + Math.sin(t * 0.005) * 0.5;
      const shimmer = 0.5 + Math.sin(t * 0.008 + 1.8) * 0.5;
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      if (state.pointer.trail.length > 1) {
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        for (let pass = 0; pass < 3; pass++) {
          ctx.beginPath();
          for (let i = 0; i < state.pointer.trail.length; i++) {
            const p = state.pointer.trail[i];
            if (i === 0) ctx.moveTo(p.x, p.y);
            else ctx.lineTo(p.x, p.y);
          }
          const alpha = pass === 0 ? 0.06 : pass === 1 ? 0.14 : 0.28;
          ctx.strokeStyle = pass === 2 ? `rgba(255, 248, 244, ${alpha})` : `rgba(170, 214, 255, ${alpha})`;
          ctx.lineWidth = pass === 0 ? 36 : pass === 1 ? 18 : 5.5;
          ctx.stroke();
        }
      }
      for (let i = state.pointer.trail.length - 1; i >= 0; i--) {
        const p = state.pointer.trail[i];
        const a = clamp(p.life, 0, 1) * (1 - i / 34);
        const rr = (7 + a * 12) * (p.width || 1);
        const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, rr * 2.8);
        g.addColorStop(0, `rgba(255, 248, 238, ${a * 0.28})`);
        g.addColorStop(0.44, `rgba(188, 225, 255, ${a * 0.16})`);
        g.addColorStop(1, "rgba(188, 225, 255, 0)");
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(p.x, p.y, rr * 2.8, 0, TAU);
        ctx.fill();
      }
      const cleanseReady = state.level === 2 && state.cleanseEnergy >= state.cleanseTarget;
      const auraBoost = state.pointer.aura + (cleanseReady ? 0.52 : 0);
      const haloRadius = 92 + auraBoost * 24 + breathe * 6;
      const halo = ctx.createRadialGradient(x, y, 0, x, y, haloRadius);
      halo.addColorStop(0, `rgba(255,255,255,${0.16 + shimmer * 0.05})`);
      halo.addColorStop(0.14, cleanseReady ? `rgba(255, 236, 186, ${0.28 + auraBoost * 0.08})` : `rgba(198, 242, 255, ${0.24 + auraBoost * 0.10})`);
      halo.addColorStop(0.42, cleanseReady ? `rgba(226, 196, 255, ${0.16 + auraBoost * 0.06})` : `rgba(198, 210, 255, ${0.14 + auraBoost * 0.08})`);
      halo.addColorStop(1, "rgba(198, 210, 255, 0)");
      ctx.fillStyle = halo;
      ctx.beginPath();
      ctx.arc(x, y, haloRadius, 0, TAU);
      ctx.fill();
      ctx.strokeStyle = `rgba(255, 245, 232, ${0.22 + auraBoost * 0.10})`;
      ctx.lineWidth = 1.3;
      ctx.shadowBlur = 18;
      ctx.shadowColor = "rgba(255, 240, 210, 0.55)";
      ctx.beginPath();
      ctx.arc(x, y, 28 + breathe * 4 + auraBoost * 6, 0, TAU);
      ctx.stroke();
      for (let i = 0; i < 4; i++) {
        const a = t * 0.0012 + i * (TAU / 4);
        const dx = Math.cos(a) * (18 + auraBoost * 8 + breathe * 2);
        const dy = Math.sin(a) * (18 + auraBoost * 8 + breathe * 2);
        const spark = ctx.createRadialGradient(x + dx, y + dy, 0, x + dx, y + dy, 8);
        spark.addColorStop(0, `rgba(255, 250, 242, ${0.58})`);
        spark.addColorStop(0.45, `rgba(214, 244, 255, ${0.26})`);
        spark.addColorStop(1, "rgba(214, 244, 255, 0)");
        ctx.fillStyle = spark;
        ctx.beginPath();
        ctx.arc(x + dx, y + dy, 8, 0, TAU);
        ctx.fill();
      }
      ctx.shadowBlur = 36 + auraBoost * 16;
      ctx.shadowColor = cleanseReady ? "rgba(255, 236, 180, 0.80)" : "rgba(214, 244, 255, 0.92)";
      const coreRadius = 14 + auraBoost * 2.6 + breathe * 1.4;
      const core = ctx.createRadialGradient(x - 4, y - 5, 0, x, y, 28);
      core.addColorStop(0, "rgba(255,255,255,1)");
      core.addColorStop(0.36, cleanseReady ? "rgba(255, 244, 206, 0.98)" : "rgba(216, 247, 255, 0.97)");
      core.addColorStop(0.76, cleanseReady ? "rgba(226, 198, 255, 0.76)" : "rgba(164, 184, 255, 0.72)");
      core.addColorStop(1, "rgba(114, 104, 210, 0.16)");
      ctx.fillStyle = core;
      ctx.beginPath();
      ctx.arc(x, y, coreRadius, 0, TAU);
      ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,0.82)";
      ctx.lineWidth = 1.1;
      ctx.beginPath();
      ctx.arc(x, y, coreRadius + 3, 0, TAU);
      ctx.stroke();
      ctx.strokeStyle = `rgba(255,255,255,${0.42 + shimmer * 0.18})`;
      ctx.lineWidth = 1.1;
      ctx.beginPath();
      ctx.moveTo(x - 11, y);
      ctx.lineTo(x + 11, y);
      ctx.moveTo(x, y - 11);
      ctx.lineTo(x, y + 11);
      ctx.stroke();
      ctx.restore();
    }

    function drawParticles() {
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      for (const p of state.particles) {
        const alpha = clamp(p.life / p.maxLife, 0, 1);
        const twinkle = 0.7 + Math.sin(p.twinkle) * 0.3;
        const color = p.warm ? "255, 226, 162" : "210, 245, 255";
        ctx.fillStyle = `rgba(${color}, ${alpha * twinkle})`;
        ctx.shadowBlur = 18;
        ctx.shadowColor = `rgba(${color}, 0.78)`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * alpha, 0, TAU);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawCompletionBurst(time) {
      const burst = state.completionBurst || 0;
      if (burst <= 0.01) return;

      const p = getCorePoint();
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      const radius = (1 - burst) * Math.max(state.width, state.height) * 0.58 + 40;
      ctx.strokeStyle = `rgba(255, 240, 188, ${burst * 0.38})`;
      ctx.lineWidth = 4 + burst * 8;
      ctx.shadowBlur = 30 + burst * 40;
      ctx.shadowColor = "rgba(255, 231, 176, 0.72)";
      ctx.beginPath();
      ctx.arc(p.x, p.y, radius, 0, TAU);
      ctx.stroke();

      const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, radius * 0.9);
      glow.addColorStop(0, `rgba(255, 248, 220, ${burst * 0.16})`);
      glow.addColorStop(0.36, `rgba(210, 192, 255, ${burst * 0.12})`);
      glow.addColorStop(1, "rgba(210, 192, 255, 0)");
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(p.x, p.y, radius * 0.9, 0, TAU);
      ctx.fill();
      ctx.restore();
    }

    function drawSkyConstellationReveal(time) {
      if (state.level !== 2 || state.constellation.skyReveal <= 0.01) return;
      const reveal = clamp(state.constellation.skyReveal, 0, 1);
      const nodes = state.constellation.nodes;
      if (!nodes.length) return;

      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      const scale = 0.46;
      const offsetX = state.width * 0.52;
      const offsetY = state.height * 0.20;
      const sourceCenterX = state.width * 0.52;
      const sourceCenterY = state.height * 0.68;

      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      for (let i = 0; i < nodes.length - 1; i++) {
        const a = nodes[i];
        const b = nodes[i + 1];
        const ax = offsetX + (a.x - sourceCenterX) * scale;
        const ay = offsetY + (a.y - sourceCenterY) * scale;
        const bx = offsetX + (b.x - sourceCenterX) * scale;
        const by = offsetY + (b.y - sourceCenterY) * scale;
        ctx.beginPath();
        ctx.moveTo(ax, ay);
        ctx.lineTo(bx, by);
        ctx.strokeStyle = `rgba(255, 240, 190, ${reveal * 0.42})`;
        ctx.lineWidth = 2;
        ctx.shadowBlur = 22;
        ctx.shadowColor = "rgba(255, 232, 178, 0.62)";
        ctx.stroke();
      }

      for (const n of nodes) {
        const x = offsetX + (n.x - sourceCenterX) * scale;
        const y = offsetY + (n.y - sourceCenterY) * scale;
        const g = ctx.createRadialGradient(x, y, 0, x, y, 18);
        g.addColorStop(0, `rgba(255,255,255,${reveal * 0.75})`);
        g.addColorStop(0.42, `rgba(255,232,178,${reveal * 0.28})`);
        g.addColorStop(1, "rgba(255,232,178,0)");
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(x, y, 18, 0, TAU);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawRouteGlow(time) {
      const points = [];
      for (let i = 0; i < 9; i++) points.push(getRoutePoint(i, false));
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      const path = () => {
        ctx.beginPath();
        points.forEach((p, i) => {
          const y = p.y + Math.sin(time * 0.001 + i) * 3;
          if (i === 0) ctx.moveTo(p.x, y);
          else ctx.lineTo(p.x, y);
        });
      };
      path();
      const glow = ctx.createLinearGradient(points[0].x, points[0].y, points[points.length - 1].x, points[points.length - 1].y);
      glow.addColorStop(0, "rgba(198, 188, 255, 0.05)");
      glow.addColorStop(0.5, "rgba(255, 236, 194, 0.07)");
      glow.addColorStop(1, "rgba(184, 232, 255, 0.05)");
      ctx.strokeStyle = glow;
      ctx.lineWidth = 42;
      ctx.stroke();
      path();
      ctx.strokeStyle = "rgba(255, 244, 212, 0.12)";
      ctx.lineWidth = 6;
      ctx.stroke();
      path();
      ctx.strokeStyle = "rgba(220, 238, 255, 0.10)";
      ctx.lineWidth = 2;
      ctx.setLineDash([10, 16]);
      ctx.lineDashOffset = -time * 0.018;
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }

    function drawVignette() {
      const w = state.width;
      const h = state.height;
      const g = ctx.createRadialGradient(w * 0.5, h * 0.55, Math.min(w, h) * 0.2, w * 0.5, h * 0.5, Math.max(w, h) * 0.76);
      g.addColorStop(0, "rgba(0,0,0,0)");
      g.addColorStop(0.64, "rgba(0,0,0,0.03)");
      g.addColorStop(1, "rgba(0,0,0,0.50)");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, w, h);
    }

    function draw(time) {
      drawBackground(time);
      drawSkyConstellationReveal(time);
      drawRouteGlow(time);
      if (state.level !== 2) drawSealScene(time);
      if (state.level === 2) drawConstellation(time);
      drawDefenseScene(time);
      for (const flower of state.flowers) drawFlower(flower);
      drawRipples();
      for (const star of state.stars) drawStar(star);
      for (const fog of state.fogs) drawFog(fog, time);
      drawParticles();
      drawCompletionBurst(time);
      drawPointer(time);
      drawVignette();
    }

    function loop(now) {
      if (!state.running) return;
      const dt = Math.min(0.033, (now - state.lastTime) / 1000 || 0);
      state.lastTime = now;
      updateHandControl(now);
      update(dt);
      draw(now);
      if (state.running) requestAnimationFrame(loop);
    }

    function idleLoop(now) {
      if (!state.running) {
        updateHandControl(now);
        draw(now);
        requestAnimationFrame(idleLoop);
      }
    }

    function setPointer(x, y) {
      state.pointer.tx = clamp(x, 0, state.width);
      state.pointer.ty = clamp(y, 0, state.height);
      if (!state.hand.active) state.hand.source = "mouse";
    }

    function runSelfTests() {
      console.groupCollapsed("光之庭院 self tests");
      console.assert(clamp(5, 0, 10) === 5, "clamp should keep in-range values");
      console.assert(clamp(-1, 0, 10) === 0, "clamp should enforce lower bound");
      console.assert(clamp(12, 0, 10) === 10, "clamp should enforce upper bound");

      const oldWidth = state.width;
      const oldHeight = state.height;
      state.width = 1000;
      state.height = 800;
      const routePoint = getRoutePoint(0, false);
      console.assert(routePoint.x === 340 && routePoint.y === 624, "getRoutePoint should map normalized route coordinates");
      state.width = oldWidth;
      state.height = oldHeight;

      const oldCombo = state.combo;
      const oldTimer = state.comboTimer;
      state.combo = 3;
      state.comboTimer = 0.01;
      updateCombo(0.02);
      console.assert(state.combo === 0 && state.comboTimer === 0, "updateCombo should reset expired combo without using global dt");
      state.combo = oldCombo;
      state.comboTimer = oldTimer;

      resetGame();
      console.assert(state.score === 0, "resetGame should reset score");
      console.assert(state.combo === 0, "resetGame should reset combo");
      console.assert(state.core === 0, "resetGame should reset core progress");
      console.assert(state.stars.length === 9, "resetGame should create initial stars");
      console.assert(state.levelComplete === false, "resetGame should clear level completion state");
      console.assert(state.fogs.length === 5, "resetGame should create five fog obstacles in level one");
      resetGame(2);
      console.assert(state.level === 2, "resetGame should accept level two");
      console.assert(state.constellation.nodes.length === 6, "level two should create six constellation nodes");
      console.assert(state.constellation.current === 1, "level two should start from the first anchor node");
      console.assert(Array.isArray(state.constellation.segmentGrades), "level two should track resonance grades");
      console.assert(typeof setupConstellationLevel === "function", "constellation setup function should exist");
      console.assert(typeof updateConstellation === "function", "constellation update function should exist");
      resetGame(1);
      console.assert(Array.isArray(state.dustLines), "resize/reset should preserve ambient dust line array");
      console.assert(normalizeLevel({ type: "click" }) === 1, "normalizeLevel should ignore click event objects and default to level one");
      console.assert(normalizeLevel(2) === 2, "normalizeLevel should keep numeric level values");
      console.assert(normalizeLevel(3) === 3, "normalizeLevel should allow unlocked level three");
      console.assert(getNextPlayableLevel(1) === 2, "level one should advance to level two");
      console.assert(getNextPlayableLevel(2) === 3, "level two should advance to level three");
      console.assert(getNextPlayableLevel(3) === null, "level three should be the current end of chapter");
      console.assert(LEVELS[3].completedTitle === "核心守护成功", "level three completion config should exist");
      console.assert(getLevelConfig(2).name === "星座回廊", "level config should return level two metadata");
      console.assert(getLevelMode(1) === "collect", "level one should use collect mode");
      console.assert(getLevelMode(2) === "constellation", "level two should use constellation mode");
      console.assert(getLevelMode(3) === "defense", "level three should use defense mode");
      resetGame(2);
      console.assert(state.constellation.nodes.length === 6, "level two should initialize constellation nodes");
      console.assert(state.constellation.rifts.length === 2, "level two should keep subtle ambient rifts");
      console.assert(typeof getSegmentGrade === "function", "segment grade function should exist");
      resetGame(1);
      updateStartPanel(2);
      console.assert(state.selectedLevel === 2, "updateStartPanel should update selected level");
      updateStartPanel(1);
      resetGame(3);
      console.assert(state.level === 3, "resetGame should accept level three");
      console.assert(state.defense.enemies.length >= 5, "level three should spawn initial defense enemies");
      console.assert(state.fogs.length === 0, "level three should use defense enemies instead of regular fogs");
      console.assert(state.stars.length === 0, "level three should not spawn collectible stars");
      resetGame(1);
      console.assert(typeof updateHandControl === "function", "hand tracking update function should exist");
      console.assert(typeof state.gesture.grabbing === "boolean", "gesture grab state should exist");
      console.assert(typeof initHandTracking === "function", "hand tracking init function should exist");
      console.assert(typeof updateFogs === "function", "fog obstacle update function should exist");
      console.assert(typeof takeFogDamage === "function", "fog damage function should exist");
      const previousCoreForDamageTest = state.core;
      const previousCooldownForDamageTest = state.damageCooldown;
      const previousRunningForDamageTest = state.running;
      state.core = 2;
      state.damageCooldown = 0;
      state.running = false;
      takeFogDamage({ x: state.pointer.x, y: state.pointer.y, hitPulse: 0 });
      console.assert(state.core === 0, "fog damage should be able to reduce core to zero");
      state.core = previousCoreForDamageTest;
      state.damageCooldown = previousCooldownForDamageTest;
      state.running = previousRunningForDamageTest;
      updateCoreHud();
      console.assert(typeof triggerLevelComplete === "function", "level completion function should exist");
      console.assert(getStarRating(true) >= 1 && getStarRating(true) <= 3, "star rating should be between 1 and 3");
      console.groupEnd();
    }

    window.addEventListener("resize", resize);
    window.addEventListener("pointermove", (event) => setPointer(event.clientX, event.clientY));
    window.addEventListener("pointerdown", (event) => {
      state.pointer.mouseDown = true;
      state.gesture.grabbing = state.level === 2;
      state.gesture.grabStrength = state.level === 2 ? 1 : 0;
      state.gesture.source = "mouse";
      setPointer(event.clientX, event.clientY);
    });
    window.addEventListener("pointerup", () => {
      state.pointer.mouseDown = false;
      if (state.gesture.source === "mouse") {
        state.gesture.grabbing = false;
        state.gesture.grabStrength = 0;
        state.gesture.source = "none";
      }
    });
    window.addEventListener("pointercancel", () => {
      state.pointer.mouseDown = false;
      if (state.gesture.source === "mouse") {
        state.gesture.grabbing = false;
        state.gesture.grabStrength = 0;
        state.gesture.source = "none";
      }
    });

    startBtn.addEventListener("click", (event) => {
      event.preventDefault();
      startGame(state.selectedLevel || 1);
    });

    levelSelect.addEventListener("click", (event) => {
      const chip = event.target.closest(".level-chip");
      if (!chip) return;
      const level = Number(chip.dataset.level);
      if (!Number.isFinite(level)) return;
      state.selectedLevel = level;
      updateStartPanel(level);
    });
    restartBtn.addEventListener("click", () => startGame(state.level || 1));
    nextBtn.addEventListener("click", () => {
      const nextLevel = getNextPlayableLevel(state.level);
      endPanel.classList.add("hidden");
      if (!nextLevel) {
        startPanel.classList.remove("hidden");
        updateStartPanel(1);
        return;
      }
      updateStartPanel(nextLevel);
      startGame(nextLevel);
    });

    window.addEventListener("beforeunload", () => {
      if (state.hand.stream) {
        state.hand.stream.getTracks().forEach(track => track.stop());
      }
    });

    resize();
    updateStartPanel(1);
    try {
      runSelfTests();
    } catch (error) {
      console.warn("Self tests skipped because one test failed:", error);
    }
    requestAnimationFrame(idleLoop);
  </script>
</body>
</html>
